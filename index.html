<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GG — Boa Viagem</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');
:root{
  --bg:#f5f3ef;--surface:#fff;--surface2:#f0ede8;--border:#e2ddd6;
  --accent:#1a3a2a;--accent2:#2d5c42;--gold:#c9a84c;--gold-light:#f0e6c8;
  --text:#1a1a18;--text2:#6b6560;--text3:#a8a29c;
  --green:#1e6b3e;--green-bg:#eaf4ee;
  --orange:#c46b00;--orange-bg:#fff4e6;
  --red:#c0392b;--red-bg:#fdf0ee;
  --blue:#1a4a7a;--blue-bg:#eaf0f8;
  --purple:#5b2d8e;--purple-bg:#f3eefa;
  --radius:12px;--shadow:0 1px 3px rgba(0,0,0,.08),0 4px 12px rgba(0,0,0,.04);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:90px}

/* HEADER */
.header{background:var(--accent);padding:14px 16px 0;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.18)}
.header-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.brand-name{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;color:#fff;letter-spacing:-.3px;line-height:1.1}
.brand-sub{font-size:10px;color:rgba(255,255,255,.45);letter-spacing:2px;text-transform:uppercase;margin-top:2px}
.date-pill{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--gold-light);background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);padding:3px 9px;border-radius:20px;white-space:nowrap}
.sync-pill{font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px;white-space:nowrap;background:rgba(196,107,0,.25);color:#ffc97a;border:1px solid rgba(196,107,0,.3);transition:all .3s}
.modal-overlay.open { display:flex !important; }
#audit_trigger:hover { opacity:1 !important; }
/* ── ABA HOJE GG ── */
.hoje-gg-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;overflow:hidden;box-shadow:var(--shadow)}
.hoje-gg-header{padding:10px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);background:var(--surface2)}
.hoje-gg-title{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:1px}
.hoje-gg-frase{background:linear-gradient(135deg,var(--accent),#2d5c42);padding:16px;text-align:center;border-radius:var(--radius);margin-bottom:12px}
.badge-novo-gg{display:inline-block;width:8px;height:8px;background:var(--red);border-radius:50%;margin-left:4px;vertical-align:middle;animation:pulse-rec 1.5s ease-in-out infinite}

/* ── SECRETÁRIA GG ── */
.sec-chat{display:flex;flex-direction:column;height:calc(100vh - 160px);min-height:400px}
.chat-messages{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:10px}
.chat-msg{max-width:88%;display:flex;flex-direction:column;gap:3px}
.chat-msg.user{align-self:flex-end}
.chat-msg.ai{align-self:flex-start}
.chat-bubble{padding:10px 14px;border-radius:16px;font-size:13px;line-height:1.5}
.chat-bubble.user{background:var(--accent);color:#fff;border-radius:16px 16px 4px 16px}
.chat-bubble.ai{background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:16px 16px 16px 4px;box-shadow:var(--shadow);line-height:1.6}
.chat-bubble.ai.loading{color:var(--text3);font-style:italic}
.chat-ts{font-size:9px;color:var(--text3);padding:0 4px}
.chat-input-bar{padding:10px 14px 14px;background:var(--surface);border-top:1px solid var(--border);display:flex;gap:8px;align-items:flex-end}
.chat-input{flex:1;padding:10px 12px;border:1px solid var(--border);border-radius:20px;font-family:'IBM Plex Sans',sans-serif;font-size:13px;color:var(--text);background:var(--surface2);resize:none;max-height:100px;line-height:1.4;outline:none}
.chat-input:focus{border-color:var(--accent);background:#fff}
.chat-btn-mic{width:38px;height:38px;border-radius:50%;border:none;background:var(--red-bg);color:var(--red);font-size:16px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.chat-btn-mic.rec{background:var(--red);color:#fff;animation:pulse-rec 1s ease-in-out infinite}
@keyframes pulse-rec{0%,100%{opacity:1}50%{opacity:0.6}}
.chat-btn-send{width:38px;height:38px;border-radius:50%;border:none;background:var(--accent);color:#fff;font-size:16px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.chat-header-bar{padding:12px 14px;background:linear-gradient(135deg,var(--accent),#2d5c42);display:flex;align-items:center;gap:10px;border-radius:var(--radius) var(--radius) 0 0}
.chat-avatar{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.agenda-item{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin:4px 0;font-size:12px}
.agenda-time{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--gold);font-weight:700}
.lembrete-item{background:var(--orange-bg);border:1px solid rgba(196,107,0,0.2);border-radius:8px;padding:8px 12px;margin:4px 0;font-size:12px;color:var(--orange)}

/* TABS */
.tabs-wrapper{position:relative}
.tabs-wrapper::before,.tabs-wrapper::after{content:'';position:absolute;top:0;bottom:0;width:32px;pointer-events:none;z-index:2;transition:opacity .2s}
.tabs-wrapper::before{left:0;background:linear-gradient(to right,var(--accent),transparent);opacity:0}
.tabs-wrapper::after{right:0;background:linear-gradient(to left,var(--accent) 30%,transparent);opacity:1}
.tabs-wrapper.scroll-start::before{opacity:0}
.tabs-wrapper.scroll-end::after{opacity:0}
.tabs-wrapper.scroll-mid::before{opacity:1}
.tabs-scroll-hint{position:absolute;right:4px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.5);font-size:13px;pointer-events:none;z-index:3;animation:nudge 1.6s ease-in-out infinite;transition:opacity .2s}
.tabs-wrapper.scroll-end .tabs-scroll-hint{opacity:0}
@keyframes nudge{0%,100%{transform:translateY(-50%) translateX(0)}50%{transform:translateY(-50%) translateX(3px)}}
.tabs{display:flex;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:9px 13px;font-family:'IBM Plex Sans',sans-serif;font-size:11px;font-weight:500;cursor:pointer;border:none;background:transparent;color:rgba(255,255,255,.45);border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.tab.active{color:#fff;border-bottom-color:var(--gold);font-weight:700}

/* SECTIONS */
.section{display:none;padding:14px 14px 0}
.hint-i{display:none}  /* ícone ⓘ só aparece no celular (desktop mostra o texto direto) */
#mobMenuTab{display:none}  /* abinha lateral só aparece no celular */
.section.active{display:block}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;box-shadow:var(--shadow);overflow:hidden}
.card-header{padding:10px 14px;background:var(--accent);display:flex;justify-content:space-between;align-items:center}
.card-header.light{background:var(--surface2);border-bottom:1px solid var(--border)}
.card-header.gold{background:linear-gradient(135deg,#1a3a2a,#2d5c42)}
.card-header.blue{background:var(--blue)}
.card-header.purple{background:var(--purple)}
.card-title{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;color:rgba(255,255,255,.9)}
.card-header.light .card-title{color:var(--accent)}
.card-subtitle{font-size:10px;color:rgba(255,255,255,.45)}
.card-count{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;background:rgba(255,255,255,.15);color:#fff;padding:2px 8px;border-radius:10px}

/* ROWS */
.row{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;border-bottom:1px solid var(--border);gap:6px}
.row:last-child{border-bottom:none}
.row.tr{background:var(--green-bg)}
.lbl{font-size:12px;color:var(--text2);flex:1;min-width:0}
.lbl.m{color:var(--text);font-weight:600}
.lbl.t{color:var(--green);font-weight:600}
.val{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;color:var(--green);background:var(--green-bg);border:1px solid rgba(30,107,62,.15);border-radius:6px;padding:4px 8px;min-width:70px;text-align:right}
.val.neu{color:var(--text2);background:var(--surface2);border-color:var(--border)}
.val.total{color:var(--accent);background:var(--surface2);border-color:var(--border);font-weight:700}
.val.neg{color:var(--red);background:var(--red-bg);border-color:rgba(192,57,43,.2)}

/* GER BLOCK */
.ger-block{border-bottom:1px solid var(--border)}
.ger-block:last-child{border-bottom:none}
.ger-head{padding:8px 14px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.ger-head-name{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:var(--accent)}
.ger-status{font-size:10px;font-weight:600;padding:2px 7px;border-radius:8px}
.ger-status.done{background:var(--green-bg);color:var(--green)}
.ger-status.pending{background:var(--orange-bg);color:var(--orange)}
.ger-status.offline{background:var(--surface2);color:var(--text3)}

/* META BAR */
.meta-row-wrap{padding:8px 14px;border-bottom:1px solid var(--border);background:rgba(201,168,76,.04)}
.meta-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.meta-lbl{font-size:10px;color:var(--text2);font-weight:600}
.meta-pct{font-size:11px;font-weight:700;color:var(--green)}
.meta-pct.warn{color:var(--orange)}
.meta-pct.low{color:var(--red)}
.progress-bar{height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--green),#4caf7d);border-radius:3px;transition:width .4s ease}
.progress-fill.warn{background:linear-gradient(90deg,var(--orange),#f0a030)}
.progress-fill.low{background:linear-gradient(90deg,var(--red),#e05a4a)}
.progress-fill.over{background:linear-gradient(90deg,var(--gold),#e8c060)}

/* STATUS GRID */
.status-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border)}
.sc{background:var(--surface);padding:10px 12px}
.sc-name{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:var(--accent);margin-bottom:2px}
.sc-time{font-size:10px;color:var(--text3);margin-bottom:5px}
.sc-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px}
.sc-badge.done{background:var(--green-bg);color:var(--green)}
.sc-badge.pending{background:var(--orange-bg);color:var(--orange)}
.sc-badge.offline{background:var(--surface2);color:var(--text3)}

/* RANKING */
.rank-item{display:flex;align-items:center;padding:9px 14px;border-bottom:1px solid var(--border);gap:8px}
.rank-item:last-child{border-bottom:none}
.rank-pos{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:700;color:var(--text3);width:22px;flex-shrink:0}
.rank-pos.p1{color:var(--gold)}
.rank-pos.p2{color:var(--text2)}
.rank-pos.p3{color:var(--orange)}
.rank-name{font-size:12px;font-weight:600;color:var(--accent);width:74px;flex-shrink:0}
.rank-bar-wrap{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.rank-bar{height:100%;background:linear-gradient(90deg,var(--green),#4caf7d);border-radius:2px;transition:width .4s ease}
.rank-val{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;color:var(--green);min-width:60px;text-align:right}

/* CLIENTE MINI */
.cm{padding:8px 14px;border-bottom:1px solid var(--border)}
.cm:last-child{border-bottom:none}
.cm-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:2px}
.cm-name{font-size:12px;font-weight:600;color:var(--text)}
.cm-badge{font-size:10px;font-weight:700;padding:1px 7px;border-radius:8px}
.cm-badge.pipe{background:var(--blue-bg);color:var(--blue)}
.cm-badge.prod{background:var(--green-bg);color:var(--green)}
.cm-detail{font-size:11px;color:var(--text3)}

/* META EDITOR */
.meta-editor-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;overflow:hidden}
.meta-editor-head{padding:10px 14px;background:linear-gradient(135deg,#1a3a2a,#2d5c42);display:flex;justify-content:space-between;align-items:center}
.meta-editor-title{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;color:var(--gold-light)}
.meta-ger-block{border-bottom:1px solid var(--border)}
.meta-ger-block:last-child{border-bottom:none}
.meta-ger-name{padding:8px 14px 6px;font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:var(--accent);background:var(--surface2);border-bottom:1px solid var(--border)}
.meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border)}
.meta-cell{background:var(--surface);padding:8px 10px}
.meta-cell-lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;font-weight:600;margin-bottom:4px}
input.meta-inp{font-family:'IBM Plex Mono',monospace;font-size:12px;background:rgba(201,168,76,.06);border:1px solid rgba(201,168,76,.3);border-radius:6px;color:var(--accent);padding:5px 7px;width:100%;text-align:right;outline:none;transition:border-color .15s;-webkit-appearance:none}
input.meta-inp:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,168,76,.12)}

/* WA TOGGLE */
.wa-row{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;background:rgba(37,211,102,.05);border-top:1px solid rgba(37,211,102,.12)}
.wa-label{font-size:11px;color:var(--text2);display:flex;align-items:center;gap:5px}
.toggle-switch{position:relative;width:36px;height:20px}
.toggle-switch input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:var(--border);border-radius:10px;cursor:pointer;transition:.2s}
.toggle-slider::before{content:'';position:absolute;width:14px;height:14px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle-switch input:checked+.toggle-slider{background:#25D366}
.toggle-switch input:checked+.toggle-slider::before{transform:translateX(16px)}

/* BOTTOM BAR */
.bottom-bar{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);padding:10px 14px;display:flex;gap:8px;z-index:200;box-shadow:0 -4px 20px rgba(0,0,0,.08)}
.btn{font-family:'IBM Plex Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;border:none;border-radius:8px;padding:11px 12px;transition:all .12s;white-space:nowrap}
.btn:active{transform:scale(.97);opacity:.88}
.btn-p{background:var(--accent);color:#fff;flex:1}
.btn-s{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
.btn-gold{background:linear-gradient(135deg,#c9a84c,#e8c060);color:#1a3a2a;font-weight:700}
.btn-excel{background:var(--green-bg);color:var(--green);border:1px solid rgba(30,107,62,.2)}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;align-items:flex-end;backdrop-filter:blur(2px)}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-height:90vh;overflow-y:auto;padding:0 0 24px;animation:up .22s cubic-bezier(.32,.72,0,1)}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mhandle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:14px auto 0}
.mheader{padding:14px 16px 12px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.mtitle{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--accent)}
.mbody{padding:14px 16px 0}
.wabox{font-family:'IBM Plex Mono',monospace;font-size:11px;line-height:1.8;color:var(--text);background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px;white-space:pre-wrap;word-break:break-word;max-height:48vh;overflow-y:auto}
.cpbtn{margin-top:12px;width:100%;padding:14px;background:#25D366;color:#fff;border:none;border-radius:10px;font-family:'IBM Plex Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.clbtn{margin-top:8px;width:100%;padding:12px;background:transparent;color:var(--text2);border:1px solid var(--border);border-radius:10px;font-family:'IBM Plex Sans',sans-serif;font-size:13px;cursor:pointer}

/* TOAST */
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--accent);color:#fff;padding:9px 20px;border-radius:24px;font-size:12px;font-weight:600;opacity:0;pointer-events:none;transition:all .2s;z-index:999;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.18)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* EMPTY */
.empty{padding:20px 14px;text-align:center;color:var(--text3);font-size:12px}
.empty-icon{font-size:26px;margin-bottom:6px}

/* LEGEND */
.legend{display:flex;gap:12px;padding:6px 14px;background:var(--bg);border-bottom:1px solid var(--border);flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text3)}
.dot{width:7px;height:7px;border-radius:50%}
.dot.g{background:var(--green)}
/* ── DIÁRIO ── */
.diario-day { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); margin-bottom:12px; overflow:hidden; box-shadow:var(--shadow); }
.diario-day-header { padding:10px 14px; background:var(--accent); display:flex; justify-content:space-between; align-items:center; }
.diario-day-date { font-family:'Syne',sans-serif; font-size:13px; font-weight:700; color:#fff; }
.diario-day-badge { font-size:10px; color:var(--gold-light); background:rgba(255,255,255,0.1); padding:2px 8px; border-radius:10px; }
.diario-entry { padding:12px 14px; font-size:13px; color:var(--text); line-height:1.6; white-space:pre-wrap; border-bottom:1px solid var(--border); }
.diario-entry:last-child { border-bottom:none; }
.diario-input-area { padding:12px 14px; }
.diario-textarea { width:100%; min-height:100px; padding:10px 12px; border:1px solid var(--border); border-radius:8px; font-family:'IBM Plex Sans',sans-serif; font-size:13px; color:var(--text); background:var(--surface2); resize:vertical; line-height:1.5; }
.diario-textarea:focus { outline:none; border-color:var(--accent); background:#fff; }
.diario-btns { display:flex; gap:8px; margin-top:8px; }
.diario-btn-mic { padding:8px 14px; background:var(--red-bg); color:var(--red); border:1px solid rgba(192,57,43,0.2); border-radius:8px; font-size:12px; font-weight:600; cursor:pointer; display:flex; align-items:center; gap:4px; }
.diario-btn-mic.recording { background:var(--red); color:#fff; animation:pulse-rec 1s ease-in-out infinite; }
@keyframes pulse-rec { 0%,100%{opacity:1} 50%{opacity:0.6} }
.diario-btn-save { flex:1; padding:8px; background:var(--accent); color:#fff; border:none; border-radius:8px; font-size:12px; font-weight:600; cursor:pointer; }
.resumo-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); margin-bottom:12px; overflow:hidden; box-shadow:var(--shadow); }
.resumo-header { padding:12px 14px; background:linear-gradient(135deg,var(--accent),#2d5c42); display:flex; justify-content:space-between; align-items:center; }
.resumo-title { font-family:'Syne',sans-serif; font-size:14px; font-weight:800; color:#fff; }
.resumo-body { padding:14px; font-size:13px; line-height:1.7; color:var(--text); white-space:pre-wrap; }
.resumo-copy-btn { margin:0 14px 14px; padding:10px; background:var(--green-bg); color:var(--green); border:1px solid rgba(30,107,62,0.2); border-radius:8px; font-size:12px; font-weight:700; cursor:pointer; width:calc(100% - 28px); text-align:center; }
.hist-resumo-item { padding:10px 14px; border-bottom:1px solid var(--border); cursor:pointer; }
.hist-resumo-item:last-child { border-bottom:none; }
.hist-resumo-item:hover { background:var(--surface2); }

/* ===== AJUSTES SÓ PARA CELULAR (não afeta o computador) ===== */
@media (max-width: 600px){
  body{ padding-bottom: 18px !important; }
  /* área de trabalho mais larga: menos moldura nas laterais */

// Dias úteis — feriados de Recife-PE calculados pela Páscoa (corretos todo ano)
function buildHolidays(year){
  function easter(y){
    const a=y%19,b=Math.floor(y/100),c=y%100,d=Math.floor(b/4),e=b%4;
    const f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30;
    const i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7;
    const m=Math.floor((a+11*h+22*l)/451);
    const month=Math.floor((h+l-7*m+114)/31),day=(h+l-7*m+114)%31+1;
    return new Date(y,month-1,day);
  }
  const ea = easter(year);
  const addDays = (d,n)=>{ const r=new Date(d); r.setDate(r.getDate()+n); return r; };
  const key = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  return new Set([
    `${year}-01-01`, // Ano Novo
    `${year}-01-06`, // Dia de Reis (Recife)
    key(addDays(ea,-48)), // Carnaval segunda
    key(addDays(ea,-47)), // Carnaval terça
    key(addDays(ea,-2)),  // Sexta-Feira Santa
    key(ea),              // Páscoa
    key(addDays(ea,60)),  // Corpus Christi
    `${year}-03-12`, // Fundação do Recife
    `${year}-04-21`, // Tiradentes
    `${year}-05-01`, // Trabalho
    `${year}-06-24`, // São João (Recife)
    `${year}-09-07`, // Independência
    `${year}-10-12`, // Nsa Sra Aparecida
    `${year}-11-02`, // Finados
    `${year}-11-15`, // Proclamação República
    `${year}-11-20`, // Zumbi
    `${year}-12-25`, // Natal
  ]);
}
const HOLIDAYS = buildHolidays(today.getFullYear());
function isBusinessDay(d){
  const dt = d instanceof Date ? d : new Date(d+'T00:00:00');
  const dow=dt.getDay(); if(dow===0||dow===6) return false;
  const k=`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
  return !HOLIDAYS.has(k);
}
function businessDaysInMonth(year,month){
  const days=[]; const last=new Date(year,month+1,0).getDate();
  for(let d=1;d<=last;d++){ const dt=new Date(year,month,d); if(isBusinessDay(dt)) days.push(d); }
  return days;
}

const API_KEY_STORAGE = 'anthropic_api_key_v1';

function getApiKey(){ return localStorage.getItem(API_KEY_STORAGE)||''; }
function saveApiKey(k){ localStorage.setItem(API_KEY_STORAGE, k.trim()); }

function checkApiKey(){
  const key = getApiKey();
  if(!key){
    const k = prompt('Para usar a SecretárIA, informe sua API Key da Anthropic:\n(Será salva apenas no seu dispositivo, nunca compartilhada)\n\nObtê-la em: console.anthropic.com');
    if(k && k.trim().startsWith('sk-ant-')){
      saveApiKey(k);
      return k.trim();
    } else if(k) {
      alert('Chave inválida. Deve começar com sk-ant-');
      return null;
    }
    return null;
  }
  return key;
}

async function callAnthropicAPI(system, messages, maxTokens=1000){
  const key = checkApiKey();
  if(!key) throw new Error('API Key não configurada. Recarregue e tente novamente.');
  
  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': key,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-5',
      max_tokens: maxTokens,
      system: system,
      messages: messages
    })
  });
  
  if(!resp.ok){
    const err = await resp.json().catch(()=>({}));
    if(resp.status === 401){
      localStorage.removeItem(API_KEY_STORAGE);
      throw new Error('API Key inválida ou expirada. Recarregue para inserir novamente.');
    }
    throw new Error(err.error?.message || `Erro ${resp.status}`);
  }
  
  return resp.json();
}

function viabMesAdd(mes,n){ const [y,m]=mes.split('-').map(Number); const d=new Date(y,m-1+n,1); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); }
function viabMesLabel(mes){ if(!mes) return '—'; const [y,m]=mes.split('-'); const nm=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'][parseInt(m)-1]||m; return nm+'/'+y.slice(2); }
function viabComboValor(prods){ const A=prods.includes('credito')||prods.includes('margem'); const B=prods.includes('safrapay')||prods.includes('cobranca'); const C=prods.includes('captacao'); if(A&&B&&C)return 8000; if(A&&(B||C))return 5000; if(B&&C)return 4000; if(A)return 2000; if(B||C)return 1500; return 0; }
function viabComboNome(v){ return {8000:'Crédito/Margem + Safrapay/Cobrança + Captação',5000:'Crédito/Margem + 1 produto',4000:'Safrapay/Cobrança + Captação',2000:'Crédito ou Margem',1500:'Safrapay, Cobrança ou Captação'}[v]||'—'; }
function viabNorm(cli){ if(!cli.v1||!cli.v2){ const evs=(cli.eventos||[]).filter(e=>e&&e.mes); cli.v1=cli.v1||{ok:!!evs[0],mes:evs[0]?evs[0].mes:'',produtos:evs[0]?(evs[0].produtos||[]):[]}; cli.v2=cli.v2||{ok:!!evs[1],mes:evs[1]?evs[1].mes:'',produtos:evs[1]?(evs[1].produtos||[]):[]}; } cli.v1.produtos=cli.v1.produtos||[]; cli.v2.produtos=cli.v2.produtos||[]; return cli; }
function viabCalcClienteFrom(cli,mAtual){ viabNorm(cli); const fator=cli.categoria==='outros'?0.5:1; const v1=cli.v1,v2=cli.v2; const inicio=v1.ok&&v1.mes?v1.mes:''; const limite=inicio?viabMesAdd(inicio,6):''; const prodAcum=Array.from(new Set([].concat(v1.produtos||[]).concat(v2.produtos||[]))); let status='vazio',ganho=0,ganhoMes=''; if(v1.ok&&v2.ok){ const dentro=v1.mes&&v2.mes&&v2.mes>=v1.mes&&(!limite||v2.mes<=limite); if(dentro){ganho=viabComboValor(prodAcum)*fator;ganhoMes=v2.mes;status='pago';} else status='foradajanela'; } else if(v1.ok){ status=(limite&&mAtual>limite)?'caiu':'esteira'; } const ganhoPorMes=ganho>0&&ganhoMes?{[ganhoMes]:ganho}:{}; return {fator,inicio,limite,prodAcum,ganho,ganhoMes,status,ganhoPorMes,totalGanho:ganho,v1,v2}; }
function viabCalcCliente(cli){ return viabCalcClienteFrom(cli,viabMesAtual()); }
function viabStatusTxt(calc){ switch(calc.status){ case 'vazio': return 'Sem viabilização'; case 'esteira': return '🛤️ Na esteira (2ª até '+viabMesLabel(calc.limite)+')'; case 'caiu': return '❌ Caiu da esteira'; case 'foradajanela': return '⚠️ 2ª fora dos 6 meses'; case 'pago': return '💰 Pago — combo '+viabComboNome(viabComboValor(calc.prodAcum)); default: return ''; } }
function viabResumoFrom(list){ const mes=viabMesAtual(); const ano=mes.split('-')[0]; const mesN=parseInt(mes.split('-')[1]); const sem=mesN<=6?1:2; let gMes=0,gSem=0,gAno=0,total=0; (list||[]).forEach(cli=>{ const c=viabCalcCliente(cli); if(c.ganho>0&&c.ganhoMes){ const [my,mm]=c.ganhoMes.split('-'); const mn=parseInt(mm); total+=c.ganho; if(c.ganhoMes===mes)gMes+=c.ganho; if(my===ano){ gAno+=c.ganho; if((sem===1&&mn<=6)||(sem===2&&mn>6))gSem+=c.ganho; } } }); return {gMes,gSem,gAno,total}; }
function viabQtdMesFrom(list){ const mes=viabMesAtual(); return (list||[]).filter(cli=>{ viabNorm(cli); return (cli.v1.ok&&cli.v1.mes===mes)||(cli.v2.ok&&cli.v2.mes===mes); }).length; }
function viabListOf(gid){ const raw=gd(gid,'viab_list'); try{ return raw?JSON.parse(raw):[]; }catch(e){ return []; } }
function viabResumoOf(gid){ return viabResumoFrom(viabListOf(gid)); }
function viabQtdMesOf(gid){ return viabQtdMesFrom(viabListOf(gid)); }
function viabGanhoMesOf(gid){ return viabResumoOf(gid).gMes; }
function viabGanhoAgencia(){ let m=0,s=0,a=0,t=0; MGR.forEach(gid=>{ const r=viabResumoOf(gid); m+=r.gMes; s+=r.gSem; a+=r.gAno; t+=r.total; }); return {gMes:m,gSem:s,gAno:a,total:t}; }
function viabFmt(v){ return v? v.toLocaleString('pt-BR',{minimumFractionDigits:0,maximumFractionDigits:2}) : '0'; }

function getPipeInfo(gid, prodId){
  if(prodId==='viab'){
    return {sum:0, count:0}; // Viabilizados não usa pipe (modelo de esteira)
  }
  if(prodId==='safrapay'){
    const {pipes}=getProds(gid,'safrapay_list');
    return {sum:pipes.reduce((s,v)=>s+pnRaw(v.vop),0), count:pipes.length};
  }
  if(prodId==='credito'){
    const {pipes}=getProds(gid,'credito_list');
    return {sum:pipes.reduce((s,v)=>s+pnRaw(v.valor),0), count:pipes.length};
  }
  return null;
}

// Helper: calcula produção final de seguro de um gerente (inclui extra do Firebase)
function getAtivosProd(gid){
  if(!gid) return 0;
  const d=DATA[gid]; if(!d) return 0;
  return (parseFloat(String(d.at_bs_prod||'0').replace(/\./g,'').replace(',','.'))||0)+
         (parseFloat(String(d.at_arv_prod||'0').replace(/\./g,'').replace(',','.'))||0);
}

function calcSeguroGer(gid){
  let prod=0, canc=0, aCanc=0, chemp=0;
  if(gid===undefined||gid===null) return 0;
  const d = DATA[gid];
  if(!d) return 0;
  const list = d.seguro_list ? JSON.parse(d.seguro_list) : [];
  prod = list.reduce((s,v)=>s+(parseFloat(String(v.valor||'0').replace(/\./g,'').replace(',','.'))||0),0);
  if(d.seguro_extra){
    try{
      const ex = JSON.parse(d.seguro_extra);
      canc  = parseFloat(String(ex.cancelados||'0').replace(/\./g,'').replace(',','.'))||0;
      aCanc = parseFloat(String(ex.a_cancelar||'0').replace(/\./g,'').replace(',','.'))||0;
      chemp = parseFloat(String(ex.chemp||'0').replace(/\./g,'').replace(',','.'))||0;
    }catch(e){}
  }
  return prod - canc - aCanc + chemp;
}

        ${meta?`<div style="height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:3px"><div style="height:100%;width:${pct}%;background:${cor};border-radius:2px"></div></div>

// Dias úteis
function getDiasUteisPassados(){
  const allDays = businessDaysInMonth(today.getFullYear(), today.getMonth());
  return allDays.filter(d=>d<=today.getDate()).length;
}
function getTotalDiasUteis(){
  return businessDaysInMonth(today.getFullYear(), today.getMonth()).length;
}
function getProjecao(real, meta){
  const du = getDiasUteisPassados();
  const tot = getTotalDiasUteis();
  if(!du || !tot || !meta) return null;
  const proj = (real/du)*tot;
  return proj;
}

function rDash(){
  const wide = window.innerWidth >= 480;
  let h = `<div style="padding:0 14px">`;
  h += buildDashFilters();
  if(DASH_MODE === 'geral'){
    h += buildDashVisaoGeral(wide);
  } else if(DASH_MODE === 'gerente'){
    h += buildDashGerente(wide);
  } else {
    h += buildDashRanking(wide);
  }
  h += `</div>`;
  el('sec-dash').innerHTML = h;
}

function buildDashFilters(){
  const modeGer = DASH_MODE==='gerente';
  const selGer = DASH_GERENTES.length===MGR.length ? 'all' : (DASH_GERENTES.length===1 ? DASH_GERENTES[0] : 'all');

    {id:'hoje',lbl:'Hoje'},{id:'semana',lbl:'Semana'},{id:'mes',lbl:'Mês'},

    <!-- Cabeçalho degradê: modo + período -->

      <!-- Toggle de modo -->

      </div>

      <!-- Auditoria discreta -->
      <div id="audit_trigger" style="position:absolute;top:8px;right:8px;opacity:0;transition:opacity 0.3s;cursor:pointer;font-size:9px;color:rgba(255,255,255,0.4)"
        onmouseenter="this.style.opacity='1'"
        onmouseleave="this.style.opacity='0'"
        ontouchstart="startAuditLongPress(event)"
        ontouchend="cancelAuditLongPress()"

          ${MGR.map(gid=>`<option value="${gid}" ${selGer===gid?'selected':''}>${NAMES[gid]}</option>`).join('')}
        </select>
      </div>`;
  }

  h += `<div style="display:flex;gap:5px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;-webkit-overflow-scrolling:touch">

</div>`;

// ── Controles de filtro ──
function setDashMode(mode){ DASH_MODE=mode; rDash(); }
function setDashPeriodo(p){ DASH_PERIODO=p; rDash(); }

// Filtrar valor por período
function getValPeriodo(gid, valFn){
  // Por enquanto retorna o valor mensal (o Firebase só tem acumulados mensais)
  // "Hoje" e "Semana" mostram a última atualização do gerente
  return valFn(gid);
}
function setDashGerentes(v){ DASH_GERENTES = v==='all' ? [...MGR] : [v]; rDash(); }
function toggleDashGerente(gid){
  // Se todos estão selecionados e clica em um → seleciona só esse
  if(DASH_GERENTES.length === MGR.length){
    DASH_GERENTES = [gid];
  } else if(DASH_GERENTES.includes(gid)){
    // Se já está selecionado e é o único → volta para todos
    if(DASH_GERENTES.length === 1){ DASH_GERENTES = [...MGR]; }
    else { DASH_GERENTES = DASH_GERENTES.filter(x=>x!==gid); }
  } else {
    DASH_GERENTES.push(gid);
  }
  rDash();
}
function setDashProdutos(v){
  if(v === 'all'){
    // "Todos" já selecionado → reverte ao último produto individual
    if(DASH_PRODUTOS.length === PRODUTOS_CFG.length){ DASH_PRODUTOS = [DASH_ULTIMO_PROD]; }
    else { DASH_PRODUTOS = PRODUTOS_CFG.map(p=>p.id); }
  } else {
    DASH_PRODUTOS = [v];
    DASH_ULTIMO_PROD = v;
  }
  rDash();
}
function toggleDashMulti(){ DASH_MULTI = !DASH_MULTI; rDash(); }
function toggleDashProduto(pid, evt){
  if((evt && evt.shiftKey) || DASH_MULTI){
    // Multi-seleção (Shift+clique no PC ou modo "Vários" no celular): toggle dentro da seleção
    if(DASH_PRODUTOS.includes(pid)){
      if(DASH_PRODUTOS.length === 1) return; // não desseleciona o último
      DASH_PRODUTOS = DASH_PRODUTOS.filter(x=>x!==pid);
    } else {
      DASH_PRODUTOS = [...DASH_PRODUTOS, pid];
    }
  } else {
    // Clique simples: seleciona apenas este
    DASH_PRODUTOS = [pid];
    DASH_ULTIMO_PROD = pid;
  }
  rDash();
}

// ── Visão por Gerente ──
function buildDashGerente(wide=false){
  const duPass = getDiasUteisPassados();
  const duTot  = getTotalDiasUteis();
  let h = '';

  // Alertas globais
  const alertas = buildAlertasGlobais();
  if(alertas) h += alertas;

  if(wide) h += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;align-items:start">`;

  DASH_GERENTES.forEach(gid=>{
    const prods = DASH_PRODUTOS.map(pid=>PRODUTOS_CFG.find(p=>p.id===pid)).filter(Boolean);
    const st = gerStatus(gid);
    const ts = DATA[gid]?._ultima_atualizacao;
    let timeStr='—';
    if(ts){ const dt=new Date(ts); timeStr=`${String(dt.getDate()).padStart(2,'0')}/${String(dt.getMonth()+1).padStart(2,'0')} ${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`; }

    h += `<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);${wide?'':'margin-bottom:14px;'}overflow:hidden;box-shadow:var(--shadow)">
      <!-- Header do gerente -->
      <div style="background:var(--accent);padding:12px 14px;display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:#fff">${NAMES[gid]}</div>
          <div style="font-size:10px;color:rgba(255,255,255,0.5);margin-top:2px">Atualizado: ${timeStr}</div>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <span class="sc-badge ${st.cls}">${st.lbl}</span>
          <a href="gerente.html?g=${gid}" target="_blank" style="font-size:10px;color:var(--gold-light);text-decoration:none;background:rgba(255,255,255,0.1);padding:4px 8px;border-radius:12px;border:1px solid rgba(255,255,255,0.2)" title="Abrir app do gerente">🔗 App</a>
        </div>
      </div>`;

    // Cards de produto — barras de atingimento sempre visíveis
    prods.forEach((p, idx)=>{
      // Separador visual entre produtos
      if(idx > 0) h += `<div style="height:2px;background:linear-gradient(90deg,rgba(30,107,62,0.25) 0%,rgba(30,107,62,0.06) 100%)"></div>`;
      // CHEMP tem card customizado
      if(p.customCard){ h += p.customCard(gid); return; }

      const real = p.valFn(gid);
      const meta = getMeta(gid, p.id);
      const pct  = getPct(real, meta);
      const gap  = meta > 0 ? Math.max(meta-real,0) : null;
      const proj = getProjecao(real, meta);
      const color = getSemaforoColor(pct);
      const bg    = getSemaforoBg(pct);
      const emoji = getSemaforoEmoji(pct);

      h += `<div style="padding:12px 14px;border-bottom:1px solid var(--border)">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <span style="font-size:11px;font-weight:700;color:var(--text2)">${emoji} ${prodLinkGG(p.lbl)}</span>
          <span style="font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:800;color:var(--accent)">${p.fmt_(real)}</span>
        </div>`;

      if(meta>0){
        const abaixo = isAbaixoRitmo(real, meta);
        const pctRitmo = getPctRitmo(real, meta);
        h += `<div style="height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-bottom:6px">
          <div style="height:100%;width:${Math.min(pct,100)}%;background:${color};border-radius:3px;transition:width .5s"></div>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text3)">
          <span>Meta: ${p.fmt_(meta)} · <strong style="color:${color}">${pct.toFixed(1)}%</strong>${abaixo ? ` <span style="color:var(--orange);font-weight:700" title="Abaixo do ritmo esperado para hoje">· 📉 ${pctRitmo}% do ritmo</span>` : ''}</span>
          ${gap>0 ? `<span style="color:var(--orange)">GAP: ${p.fmt_(gap)}</span>` : `<span style="color:var(--green);font-weight:700">✅ Meta!</span>`}
        </div>`;
        if(proj!==null){
          const projPct = meta>0?(proj/meta*100):0;
          const projColor = projPct>=100?'var(--green)':projPct>=80?'var(--orange)':'var(--red)';
          h += `<div style="margin-top:4px;font-size:10px;color:var(--text3)">📈 Projeção: <strong style="color:${projColor}">${p.fmt_(proj)}</strong> (${projPct.toFixed(0)}% da meta)</div>`;
        }

        // Pipe — apenas para produtos que rastreiam pipeline
        const pipeInfo = getPipeInfo(gid, p.id);
        if(pipeInfo !== null){
          const pipeProj = real + pipeInfo.sum;
          const pipePct = (pipeProj/meta*100);
          const pipeSuf = pipeProj >= meta;
          h += `<div style="margin-top:6px;padding-top:5px;border-top:1px dashed var(--border)">
            <div style="display:flex;justify-content:space-between;align-items:center;font-size:10px">
              <span style="color:var(--text3)">🔵 Pipe${pipeInfo.count>0?` (${pipeInfo.count})`:''}:&nbsp;<strong style="color:var(--blue)">${p.fmt_(pipeInfo.sum)}</strong></span>

            </div>`;
          if(!pipeSuf){
            h += `<div style="margin-top:3px;padding:3px 8px;background:rgba(224,113,32,0.1);border-left:3px solid var(--orange);border-radius:3px;font-size:10px;font-weight:700;color:var(--orange)">⚠️ PIPE INSUFICIENTE — falta ${p.fmt_(Math.max(meta-pipeProj,0))} para fechar a meta</div>`;
          }
          h += `</div>`;
        }
      } else {
        h += `<div style="font-size:10px;color:var(--text3);font-style:italic">⏳ Sem meta definida</div>`;
      }

      h += `</div>`;
    });

    // Gráfico de barras horizontal (SVG inline) — sempre visível
    if(prods.length > 1){
      h += buildBarChart(gid, prods);
    }

    h += `</div>`; // fecha card do gerente
  });

  if(wide) h += `</div>`; // fecha grid

  return h;
}

// ── Gráfico de barras SVG horizontal ──
function buildBarChart(gid, prods){
  const W=320, barH=20, gap=8, padL=90, padR=60, padTop=10;
  const H = padTop + prods.length*(barH+gap);
  const maxPct = 100;

  let svg = `<div style="padding:12px 14px;border-top:1px solid var(--border);overflow-x:auto">
    <div style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">% Atingimento por Produto</div>
    <svg viewBox="0 0 ${W} ${H}" width="100%" style="max-width:${W}px">`;

  prods.forEach((p,i)=>{
    const real = p.valFn(gid);
    const meta = getMeta(gid, p.id);
    const pct  = Math.min(getPct(real,meta),100);
    const color= getSemaforoColor(pct);
    const y    = padTop + i*(barH+gap);
    const barW = Math.round(((W-padL-padR)/100)*pct);

    svg += `<text x="${padL-4}" y="${y+barH*0.72}" text-anchor="end" font-size="9" fill="#6b6560" font-family="IBM Plex Sans">${p.lbl.substring(0,12)}</text>`;
    svg += `<rect x="${padL}" y="${y}" width="${W-padL-padR}" height="${barH}" rx="4" fill="#e2ddd6"/>`;
    svg += `<rect x="${padL}" y="${y}" width="${barW||2}" height="${barH}" rx="4" fill="${color}"/>`;
    svg += `<text x="${padL+barW+4}" y="${y+barH*0.72}" font-size="9" fill="${color}" font-weight="700" font-family="IBM Plex Mono">${pct.toFixed(0)}%</text>`;
  });

  svg += `</svg></div>`;
  return svg;
}

// Verifica se um gerente está abaixo do ritmo em um produto
function isAbaixoRitmo(real, meta){
  const duPass = getDiasUteisPassados();
  const duTot  = getTotalDiasUteis();
  if(!meta || !duPass || !duTot) return false;
  const ritmoEsp = (meta/duTot)*duPass;
  if(ritmoEsp <= 0) return false;
  return real < ritmoEsp * 0.7;
}
function getPctRitmo(real, meta){
  const duPass = getDiasUteisPassados();
  const duTot  = getTotalDiasUteis();
  if(!meta || !duPass || !duTot) return 0;
  const ritmoEsp = (meta/duTot)*duPass;
  if(ritmoEsp <= 0) return 0;
  return Math.round((real/ritmoEsp)*100);
}

// ── Visão de Ranking ──
function buildDashRanking(wide=false){
  let h = '';
  const prods = DASH_PRODUTOS.map(pid=>PRODUTOS_CFG.find(p=>p.id===pid)).filter(Boolean);

  if(wide) h += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;align-items:start">`;

  prods.forEach(p=>{
    const ranking = MGR.map(gid=>({
      gid, nome:NAMES[gid],
      val: p.valFn(gid),
      meta: getMeta(gid,p.id),
    })).sort((a,b)=>b.val-a.val);

    const maxVal = ranking[0]?.val || 1;

    h += `<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);${wide?'':'margin-bottom:14px;'}overflow:hidden;box-shadow:var(--shadow)">
      <div style="background:var(--accent);padding:10px 14px;display:flex;justify-content:space-between;align-items:center">
        <span style="font-family:'Syne',sans-serif;font-size:13px;font-weight:800;color:#fff">🏆 ${prodLinkGG(p.lbl)}</span>
        <span style="font-size:10px;color:rgba(255,255,255,0.5)">${getDiasUteisPassados()}/${getTotalDiasUteis()} dias úteis</span>
      </div>`;

    // Calcular posições com empate
    let posAtual = 1;
    ranking.forEach((r,i)=>{
      if(i>0 && ranking[i].val < ranking[i-1].val) posAtual = i+1;
      ranking[i]._pos = posAtual;
    });

    ranking.forEach((r,i)=>{
      const pct    = getPct(r.val,r.meta);
      const color  = getSemaforoColor(pct);
      const barPct = maxVal>0?Math.round((r.val/maxVal)*100):0;
      const pos    = r._pos||i+1;
      const medal  = pos===1?'🥇':pos===2?'🥈':pos===3?'🥉':'';
      const gap    = r.meta>0?Math.max(r.meta-r.val,0):null;
      const rowBg  = r.val < 0 ? 'background:rgba(192,57,43,0.06)' : '';

      h += `<div style="padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;${rowBg}">
        <div style="font-family:'Syne',sans-serif;font-size:18px;font-weight:800;width:28px;flex-shrink:0;color:${i===0?'#FFD700':i===1?'#C0C0C0':i===2?'#CD7F32':'var(--text3)'}">${medal||`${i+1}º`}</div>
        <div style="flex:1;min-width:0">
          <div style="display:flex;justify-content:space-between;margin-bottom:4px">
            <span style="font-size:12px;font-weight:700">${r.nome}</span>
            <span style="font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:700;color:${r.val<0?'var(--red)':'var(--accent)'}">${r.val<0?'−':''}${p.fmt_(Math.abs(r.val))}</span>
          </div>
          <div style="height:5px;background:var(--border);border-radius:3px;overflow:hidden;margin-bottom:4px">
            <div style="height:100%;width:${barPct}%;background:${r.val<0?'var(--red)':color};border-radius:3px"></div>
          </div>
          <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text3)">
            ${r.val<0
              ? `<span style="color:var(--red);font-weight:700">⚠️ Produção final negativa</span>`
              : r.meta>0
                ? `<span>${pct.toFixed(1)}% da meta (${p.fmt_(r.meta)})</span>${gap>0?`<span style="color:var(--orange)">GAP: ${p.fmt_(gap)}</span>`:`<span style="color:var(--green)">✅</span>`}`
                : `<span style="font-style:italic">Sem meta</span>`}
          </div>
        </div>
        ${r.val<0?`<div style="width:4px;height:36px;background:var(--red);border-radius:2px;flex-shrink:0"></div>`:`<div style="width:4px;height:36px;background:${r.val>0?'var(--green)':'var(--border)'};border-radius:2px;flex-shrink:0"></div>`}
      </div>`;
    });

    // Total do produto
    const total = ranking.reduce((s,r)=>s+r.val,0);
    const totalMeta = ranking.reduce((s,r)=>s+r.meta,0);
    const totalPct = getPct(total,totalMeta);
    h += `<div style="padding:8px 14px;background:var(--surface2);display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:11px;font-weight:700;color:var(--text2)">Total Agência</span>
      <div style="text-align:right">
        <div style="font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:800;color:var(--accent)">${p.fmt_(total)}</div>
        ${totalMeta>0?`<div style="font-size:10px;color:${getSemaforoColor(totalPct)};font-weight:700">${totalPct.toFixed(1)}% da meta</div>`:''}
      </div>
    </div>
    </div>`;
  });

  if(wide) h += `</div>`; // fecha grid

  return h;
}

function semHex(pct){ if(pct>=80) return '#1e6b3e'; if(pct>=50) return '#c46b00'; return '#c0392b'; }

function dashChartAgencia(){
  const prods=PRODUTOS_CFG;
  const barH=18, gap=10, padTop=6, padL=96, padR=46;
  const W=330, H=padTop+prods.length*(barH+gap);
  let svg=`<svg viewBox="0 0 ${W} ${H}" width="100%" style="max-width:${W}px">`;
  prods.forEach((p,i)=>{
    const total=MGR.reduce((s,g)=>s+(p.valFn(g)||0),0);
    const metaT=MGR.reduce((s,g)=>s+getMeta(g,p.id),0);
    const pctReal=getPct(total,metaT);
    const barPct=Math.min(pctReal,100);
    const color=metaT>0?semHex(pctReal):'#a8a29c';
    const y=padTop+i*(barH+gap);
    const barW=Math.round(((W-padL-padR)/100)*barPct);
    svg+=`<text x="${padL-4}" y="${y+barH*0.72}" text-anchor="end" font-size="9" fill="#6b6560" font-family="IBM Plex Sans">${p.lbl.substring(0,14)}</text>`;
    svg+=`<rect x="${padL}" y="${y}" width="${W-padL-padR}" height="${barH}" rx="4" fill="#e2ddd6"/>`;
    svg+=`<rect x="${padL}" y="${y}" width="${barW||2}" height="${barH}" rx="4" fill="${color}"/>`;
    svg+=`<text x="${padL+(barW||2)+4}" y="${y+barH*0.72}" font-size="9" fill="${color}" font-weight="700" font-family="IBM Plex Mono">${metaT>0?pctReal.toFixed(0)+'%':'—'}</text>`;
  });
  svg+=`</svg>`;
  return svg;
}

function dashChartGerentes(p){
  const data=MGR.map(g=>({nome:NAMES[g], val:p.valFn(g)||0})).sort((a,b)=>b.val-a.val);
  const max=Math.max.apply(null, data.map(d=>d.val).concat([1]));
  const barH=18, gap=8, padTop=6, padL=72, padR=78;
  const W=330, H=padTop+data.length*(barH+gap);
  let svg=`<svg viewBox="0 0 ${W} ${H}" width="100%" style="max-width:${W}px">`;
  data.forEach((d,i)=>{
    const y=padTop+i*(barH+gap);
    const barW=Math.round((W-padL-padR)*(d.val>0?d.val/max:0));
    const color=i===0?'#1e6b3e':'#4caf7d';
    svg+=`<text x="${padL-4}" y="${y+barH*0.72}" text-anchor="end" font-size="9" fill="#6b6560" font-family="IBM Plex Sans">${(i===0?'🥇 ':'')+d.nome.substring(0,8)}</text>`;
    svg+=`<rect x="${padL}" y="${y}" width="${W-padL-padR}" height="${barH}" rx="4" fill="#f0ede8"/>`;
    svg+=`<rect x="${padL}" y="${y}" width="${Math.max(barW, d.val>0?2:0)}" height="${barH}" rx="4" fill="${color}"/>`;
    svg+=`<text x="${padL+Math.max(barW,2)+4}" y="${y+barH*0.72}" font-size="8.5" fill="#6b6560" font-weight="700" font-family="IBM Plex Mono">${p.fmt_(d.val)}</text>`;
  });
  svg+=`</svg>`;
  return svg;
}

// ── Destaques do Mês ──
function calcMelhoresMes(){
  const porProduto = PRODUTOS_CFG.map(p=>{
    const rank = MGR.map(g=>({gid:g, nome:NAMES[g], val:p.valFn(g)||0})).filter(r=>r.val>0).sort((a,b)=>b.val-a.val);
    return { p, melhor: rank[0]||null, rank };
  });
  const scores={}; MGR.forEach(g=>scores[g]=0);
  porProduto.forEach(({rank})=>{ const n=rank.length; rank.forEach((r,i)=>{ scores[r.gid]+=(n-i); }); });
  const geral = MGR.map(g=>({gid:g, nome:NAMES[g], score:scores[g]})).filter(x=>x.score>0).sort((a,b)=>b.score-a.score);
  return { porProduto, geral };
}
function abrirDestaquesMes(){
  const {porProduto, geral} = calcMelhoresMes();

  porProduto.forEach(({p,melhor})=>{ if(melhor) txt += `• ${p.lbl}: ${melhor.nome} — ${p.fmt_(melhor.val)}\n`; });
  if(geral.length>1){ txt += `\n📊 PÓDIO GERAL:\n`; geral.slice(0,3).forEach((r,i)=>{ txt += `${['🥇','🥈','🥉'][i]} ${r.nome} (${r.score} pts)\n`; }); }
  window._destaquesTxt = txt;

  let body='';

      body += `<div style="display:flex;justify-content:center;gap:18px;margin-bottom:16px">`;
      geral.slice(0,3).forEach((r,i)=>{ const med=['🥇','🥈','🥉'][i]; body+=`<div style="text-align:center"><div style="font-size:22px">${med}</div><div style="font-size:12px;font-weight:700;color:var(--text)">${escSec(r.nome)}</div><div style="font-size:10px;color:var(--text3)">${r.score} pts</div></div>`; });

  ov.innerHTML = `<div style="background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-width:520px;max-height:88vh;overflow-y:auto;padding:18px 16px 28px">

  </div>`;
  ov.style.display='flex';
}
function copiarDestaques(){
  const txt=window._destaquesTxt||'';
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(()=>showToast('✅ Copiado!')).catch(()=>fallbackCopy(txt));
  } else fallbackCopy(txt);
}
function fallbackCopy(txt){ const ta=document.createElement('textarea'); ta.value=txt; document.body.appendChild(ta); ta.select(); try{document.execCommand('copy'); showToast('✅ Copiado!');}catch(e){} ta.remove(); }

// ── Análise IA ──
async function gerarAnaliseIA(gid){
  const div = el(`ia_${gid}`);
  if(!div) return;
  div.innerHTML = `<div style="color:var(--purple);font-style:italic">🤖 Analisando dados...</div>`;

  const prods = DASH_PRODUTOS.map(pid=>PRODUTOS_CFG.find(p=>p.id===pid)).filter(Boolean);
  const duPass = getDiasUteisPassados();
  const duTot  = getTotalDiasUteis();

  // Montar contexto para a IA
  const linhas = prods.map(p=>{
    const real = p.valFn(gid);
    const meta = getMeta(gid, p.id);
    const pct  = getPct(real,meta);
    const proj = getProjecao(real,meta);
    return `${p.lbl}: realizado=${p.fmt_(real)}, meta=${meta?p.fmt_(meta):'sem meta'}, atingimento=${meta?pct.toFixed(1)+'%':'—'}, projeção=${proj?p.fmt_(proj):'—'}`;
  }).join('\n');

  const prompt = `Você é um consultor especialista em gestão comercial bancária. Analise os dados de produção do gerente ${NAMES[gid]} referentes ao mês atual no Banco Safra, Agência Boa Viagem.

Dados (${duPass} de ${duTot} dias úteis passados):
${linhas}

Escreva uma análise executiva em português, com:
1. Avaliação geral do desempenho (2 frases)
2. Pontos de atenção ou alertas (máx 2)
3. Uma frase motivacional reflexiva e profunda que provoque reflexão sobre a performance

Seja direto, específico e use os números. Máximo 150 palavras.`;

  try {
    const data = await callAnthropicAPI('', [{ role:'user', content: prompt }], 400);
    const texto = data.content?.[0]?.text || 'Não foi possível gerar análise.';
    div.innerHTML = `<div style="background:var(--purple-bg);border:1px solid rgba(91,45,142,0.15);border-radius:8px;padding:12px;font-size:12px;line-height:1.6;color:var(--text);white-space:pre-wrap">${texto}</div>`;
  } catch(e){
    div.innerHTML = `<div style="color:var(--red);font-size:11px">Erro ao conectar com IA: ${e.message}</div>`;
  }
}

function toggleGGSegObs(){
  const body = el('gg_seg_obs_body');
  const preview = el('gg_seg_obs_preview');
  if(!body) return;
  const hidden = body.style.display==='none';
  body.style.display = hidden?'block':'none';
  if(preview) preview.style.display = hidden?'none':'block';
}

  localStorage.setItem('gg_seguro_obs', val);
}

async function salvarSeguroGG(){
  const db = firebase.database();
  let salvos = 0;
  for(const gid of MGR){
    const chemp  = el(`seg_gg_chemp_${gid}`)?.value||'';
    const canc   = el(`seg_gg_canc_${gid}`)?.value||'';
    const acanc  = el(`seg_gg_acanc_${gid}`)?.value||'';
    const extra  = JSON.stringify({ cancelados:canc, a_cancelar:acanc, chemp });
    const obs    = el('gg_seg_obs_input')?.value||'';
    try{
      await db.ref(`agencia/boa_viagem/${MONTH_KEY}/gerentes/${gid}`).update({
        seguro_extra: extra,
        seguro_obs_gg: obs
      });
      salvos++;
    }catch(e){ console.warn('Erro ao salvar seguro de',gid,e); }
  }

  localStorage.setItem('gg_seguro_obs', el('gg_seg_obs_input')?.value||'');

}

function waToday(){ return today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0')+'-'+String(today.getDate()).padStart(2,'0'); }
function waListSum(gid,key,campo,soHoje,soProd){ try{ let l=JSON.parse(gd(gid,key)||'[]'); if(soProd!==false) l=l.filter(x=>x.tipo==='prod'); if(soHoje) l=l.filter(x=>x.data===waToday()); return l.reduce((s,v)=>s+pnRaw(v[campo]),0); }catch(e){ return 0; } }
function ggContasList(gid){ try{ return JSON.parse(gd(gid,'contas_clientes')||'[]'); }catch(e){ return []; } }
function ggContasCount(gid){ return ggContasList(gid).length; }
function ggContasDia(gid){ const td=chkTodayGG(); return ggContasList(gid).filter(x=>x.data===td).length; }
function waContasVAmes(g){ return ggContasList(g).filter(x=>x.tipo==='amarela'||x.tipo==='verde').length; }
function waContasVAhoje(g){ const td=chkTodayGG(); return ggContasList(g).filter(x=>(x.tipo==='amarela'||x.tipo==='verde')&&x.data===td).length; }
function waChempPorTipo(g,tipo){ try{ return JSON.parse(gd(g,'chemp_list')||'[]').filter(x=>x.tipoChemp===tipo).reduce((s,v)=>s+pnRaw(v.valor),0); }catch(e){ return 0; } }

// Lembrete 18:30 (dia útil, não feriado) — abre a mensagem pronta (envio manual: WhatsApp não permite postar sozinho em grupo)
function checkRelatorioReminder(){
  const now=new Date();
  if(!isBusinessDay(now)) return;
  const hm=now.getHours()*60+now.getMinutes();
  if(hm < 18*60+30 || hm > 18*60+45) return;
  const hoje=toDateStrGG(now);
  if(localStorage.getItem('gg_relatorio_remind')===hoje) return;
  try{ localStorage.setItem('gg_relatorio_remind', hoje); }catch(e){}
  try{ if('Notification' in window && Notification.permission==='granted') new Notification('📋 Relatório do dia (18:30)',{body:'Toque para enviar o consolidado pra sua gestora.',requireInteraction:true}); }catch(e){}
  showToast('📋 18:30 — hora do relatório! Mensagem pronta, é só enviar no grupo.');
  try{ openWA(); }catch(e){}
}

function buildExcel(){
  const XLSX = window.XLSX;
  const wb = XLSX.utils.book_new();
  const mth = `${today.getMonth()+1<10?'0':''}${today.getMonth()+1}/${today.getFullYear()}`;

  // ── Aba 1: Resumo ──
  const resumoData = [
    ['PRODUÇÃO — AG. BOA VIAGEM · BANCO SAFRA · '+mth],
    [],
    ['Gerente','Ativos Total','Captação','Collar Kin','Abertura de conta','Consórcio','Giro Mês','Seguro','TAC Mês'],
  ];
  let totRow = ['TOTAL AGÊNCIA',0,0,0,0,0,0,0,0];
  MGR.forEach(gid=>{
    let ativ=0; AT.forEach(p=>ativ+=getMes(gid,`at_${slug(p)}`));
    const row = [NAMES[gid], ativ, getMes(gid,'captacao'), getMes(gid,'collarkin'),
      getMes(gid,'contas'), getMes(gid,'consorcio'), getMes(gid,'giro'),
      getMes(gid,'seguro'), getMes(gid,'tac')];
    for(let i=1;i<9;i++) totRow[i]+=row[i];
    resumoData.push(row);
  });
  resumoData.push(totRow);
  const ws1 = XLSX.utils.aoa_to_sheet(resumoData);
  ws1['!cols'] = [{wch:22},{wch:14},{wch:12},{wch:14},{wch:12},{wch:12},{wch:12},{wch:12},{wch:12}];
  XLSX.utils.book_append_sheet(wb, ws1, '📊 Resumo');

  // ── Aba 2: Metas vs Realizado ──
  const metasData = [['METAS VS REALIZADO — '+mth],[]];
  const hdr=['Gerente'];
  META_KEYS.forEach(k=>hdr.push(k.toUpperCase()+' Meta', k.toUpperCase()+' Real', k.toUpperCase()+' %'));
  metasData.push(hdr);
  MGR.forEach(gid=>{
    const row=[NAMES[gid]];
    META_KEYS.forEach(k=>{
      const meta=METAS[gid]?.[k]||0;
      let real=0;
      if(k==='ativos'){ AT.forEach(p=>real+=getMes(gid,`at_${slug(p)}`)); }
      else real=getMes(gid,k);
      row.push(meta, real, meta?parseFloat((real/meta*100).toFixed(1)):0);
    });
    metasData.push(row);
  });
  const ws2=XLSX.utils.aoa_to_sheet(metasData);
  XLSX.utils.book_append_sheet(wb,ws2,'🎯 Metas vs Realizado');

  // ── Aba 3: Status do dia ──
  const statusData=[['STATUS DO DIA — '+mth],[],['Gerente','Última Atualização','Status']];
  MGR.forEach(gid=>{
    const d=DATA[gid]; const ts=d?._ultima_atualizacao;
    let timeStr='—';
    if(ts){ const dt=new Date(ts); timeStr=`${String(dt.getDate()).padStart(2,'0')}/${String(dt.getMonth()+1).padStart(2,'0')} ${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`; }
    statusData.push([NAMES[gid], timeStr, d?(d.dia_concluido?'✅ Concluído':'⏳ Pendente'):'⚪ Offline']);
  });
  const ws3=XLSX.utils.aoa_to_sheet(statusData);
  ws3['!cols']=[{wch:20},{wch:22},{wch:16}];
  XLSX.utils.book_append_sheet(wb,ws3,'📅 Status');

  // ── Aba 4: CHEMP ──
  const chempData=[['CHEMP — '+mth],[],['Gerente','Cliente','Tipo','Valor','Data']];
  MGR.forEach(gid=>{
    let l=[]; try{ l=JSON.parse(gd(gid,'chemp_list')||'[]'); }catch(e){}
    l.forEach(v=>{ chempData.push([NAMES[gid], v.cliente||'—', v.tipoChemp==='aumento'?'Aumento de limite':v.tipoChemp==='contratado'?'Contratado':'', pnRaw(v.valor), v.data?fmtDate(v.data):'—']); });
  });
  const ws4=XLSX.utils.aoa_to_sheet(chempData);
  XLSX.utils.book_append_sheet(wb,ws4,'🏦 CHEMP');

  // ── Aba 5: Pipes & Crédito ──
  const pipesData=[['PIPES & CRÉDITO — '+mth],[],
    ['Gerente','Módulo','Tipo','Cliente','Detalhe','Valor','Garantia','Prestamista','Data','Status']];
  MGR.forEach(gid=>{
    [['viab_list','Viabilizados'],['safrapay_list','Safrapay'],['credito_list','Crédito']].forEach(([key,mod])=>{
      const raw=gd(gid,key); const list=raw?JSON.parse(raw):[];
      if(key==='viab_list'){
        list.forEach(v=>{
          const calc=viabCalcCliente(v);
          const prodTxt = calc.prodAcum.length?calc.prodAcum.map(p=>VIAB_PROD_LBL[p]).join('+'):'';
          const stTxt = ({vazio:'Sem viabilização',esteira:'Na esteira (2ª até '+viabMesLabel(calc.limite)+')',caiu:'Caiu da esteira',foradajanela:'2ª fora dos 6 meses',pago:'Pago'})[calc.status]||'';
          pipesData.push([NAMES[gid],mod, v.categoria==='outros'?'Outros (50%)':'Verde/Amarelo',
            v.cliente||'—', prodTxt, 'R$ '+viabFmt(calc.totalGanho), '', '', '', stTxt]);
        });
        return;
      }
      list.forEach(v=>{
        pipesData.push([NAMES[gid],mod,v.tipo==='prod'?'Produção':'Pipe',
          v.cliente||'—', v.viabiliza||v.status||'',
          v.valor||v.vop||'',v.garantia||'',v.seguro||v.arvValor||'',
          v.data?fmtDate(v.data):'—',fmtStatus(v.status||'')]);
      });
    });
  });
  const ws5=XLSX.utils.aoa_to_sheet(pipesData);
  ws5['!cols']=[{wch:14},{wch:14},{wch:10},{wch:24},{wch:20},{wch:14},{wch:16},{wch:14},{wch:14},{wch:20}];
  ws5['!autofilter']={ref:'A3:J3'};
  XLSX.utils.book_append_sheet(wb,ws5,'👥 Pipes & Crédito');

  // Salvar
  const mesesExt=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const [anoEx,mesEx]=mth.split('/');
  const mesNome=mesesExt[parseInt(mesEx)-1]||mesEx;
  const fname=`Producao_BoaViagem_${mesNome}${anoEx}.xlsx`;
  try {
    XLSX.writeFile(wb,fname);
    showToast(`✅ ${fname} baixado! Verifique sua pasta de Downloads.`);
  } catch(e) {
    // Fallback para Safari/iOS: gerar Blob e link de download
    try {
      const wbout = XLSX.write(wb, {bookType:'xlsx', type:'array'});
      const blob = new Blob([wbout], {type:'application/octet-stream'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = fname;
      document.body.appendChild(a); a.click();
      setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(url); }, 1000);
      showToast(`✅ ${fname} — toque em "Download" se solicitado`);
    } catch(e2){
      showToast('⚠️ Não foi possível baixar. Tente pelo navegador Chrome.');
    }
  }
}

let CHK_ALL = {};            // { gid: { 'YYYY-MM-DD': rec } }
let CHK_GG_OPEN = null;      // gerente expandido
let CHK_GG_MIC = {id:null, rec:null, base:''};
function chkTodayGG(){ return today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0')+'-'+String(today.getDate()).padStart(2,'0'); }
function ggChkNorm(r){ r=r||{}; r.checkin=Object.assign({feito:false,hora:'',foco:[],tarefas:[],orientacaoGG:''}, r.checkin||{}); r.checkin.foco=r.checkin.foco||[]; let t=r.checkin.tarefas; t=Array.isArray(t)?t.slice():(t&&typeof t==='object'?Object.values(t):[]); t.sort((a,b)=>(a.ts||0)-(b.ts||0)); r.checkin.tarefas=t; r.checkout=Object.assign({feito:false,hora:'',resultado:'',travas:'',aprendizados:'',feedbackGG:'',humor:''}, r.checkout||{}); return r; }
function ggChkGet(gid){ return ggChkNorm((CHK_ALL[gid]||{})[chkTodayGG()]); }
function ggChkLocal(gid){ CHK_ALL[gid]=CHK_ALL[gid]||{}; CHK_ALL[gid][chkTodayGG()]=ggChkNorm(CHK_ALL[gid][chkTodayGG()]); return CHK_ALL[gid][chkTodayGG()]; }
function ggChkWrite(gid, path, val){ if(db){ try{ db.ref(`agencia/boa_viagem/checkin/${gid}/${chkTodayGG()}/${path}`).set(val); }catch(e){} } }
function chkHoraGG(iso){ if(!iso) return ''; try{ const d=new Date(iso); return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); }catch(e){ return ''; } }
function chkGGBusy(){ if(CHK_GG_MIC.rec) return true; const a=document.activeElement; return !!(a && (a.tagName==='TEXTAREA'||a.tagName==='INPUT') && a.closest && a.closest('#sec-checkin')); }

function initCheckinSyncGG(){
  if(!db) return;
  db.ref('agencia/boa_viagem/checkin').on('value', snap=>{
    CHK_ALL = snap.val()||{};
    try{ if(ACTIVE_TAB==='checkin' && !chkGGBusy()) rCheckinGG(); }catch(_){}
  }, err=>console.warn('checkin GG listener',err));
}

function ggProducaoHoje(gid){
  const td=chkTodayGG(); const out=[];
  const listVal=(key,campo,soProd)=>{ try{ let l=JSON.parse(gd(gid,key)||'[]'); if(soProd!==false) l=l.filter(x=>x.tipo==='prod'); return {dia:l.filter(x=>x.data===td).reduce((s,v)=>s+pnRaw(v[campo]),0), mes:l.reduce((s,v)=>s+pnRaw(v[campo]),0)}; }catch(e){ return {dia:0,mes:0}; } };
  const money=(ic,lbl,d,m)=>{ if(d>0||m>0) out.push(`${ic} ${lbl}: dia R$ ${fmt(d)} · mês R$ ${fmt(m)}`); };
  const qtd=(ic,lbl,d,m)=>{ if(d>0||m>0) out.push(`${ic} ${lbl}: dia ${Math.round(d)||'—'} · mês ${Math.round(m)||'—'}`); };
  qtd('🏦','Abertura de conta', ggContasDia(gid), ggContasCount(gid));
  qtd('🔄','Giro', pnd(gid,'giro_dia'), getMes(gid,'giro'));
  const tac=listVal('credito_list','tac'); money('📊','TAC', tac.dia, tac.mes);
  const cr=listVal('credito_list','valor'); money('💼','Crédito', cr.dia, cr.mes);
  const cap=listVal('captacao_list','valor'); money('🪙','Captação', cap.dia, cap.mes);
  const col=listVal('collarkin_list','valor'); money('📈','Collar Kin', col.dia, col.mes);
  const con=listVal('consorcio_list','valor'); money('🔑','Consórcio', con.dia, con.mes);
  const sp=listVal('safrapay_list','vop'); money('💳','Safrapay (VOP)', sp.dia, sp.mes);
  const sg=listVal('seguro_list','valor',false); money('🛡️','Seguro', sg.dia, sg.mes);
  return out;
}

// ── Ações do GG ──
function toggleChkGGOpen(gid){ CHK_GG_OPEN = (CHK_GG_OPEN===gid?null:gid); rCheckinGG(); }
function ggChkSetOrientacao(gid,val){ ggChkLocal(gid).checkin.orientacaoGG=val; ggChkWrite(gid,'checkin/orientacaoGG',val); }
function ggChkSetFeedback(gid,val){ ggChkLocal(gid).checkout.feedbackGG=val; ggChkWrite(gid,'checkout/feedbackGG',val); }
function ggChkAddTarefa(gid){ const rec=ggChkLocal(gid); const t={id:'g'+Date.now(), ts:Date.now(), texto:'', produto:'', por:'gg', feito:false, obs:''}; rec.checkin.tarefas.push(t); ggChkWrite(gid,'checkin/tarefas/'+t.id, t); rCheckinGG(); setTimeout(()=>{ const ta=document.querySelector('[data-ggtask="'+t.id+'"]'); if(ta) ta.focus(); },30); }
function ggChkSetTarefa(gid,id,val){ const rec=ggChkLocal(gid); const t=rec.checkin.tarefas.find(x=>x.id===id); if(t){ t.texto=val; ggChkWrite(gid,'checkin/tarefas/'+id+'/texto', val); } }
function ggChkRemoveTarefa(gid,id){ const rec=ggChkLocal(gid); rec.checkin.tarefas=rec.checkin.tarefas.filter(x=>x.id!==id); if(db){ try{ db.ref(`agencia/boa_viagem/checkin/${gid}/${chkTodayGG()}/checkin/tarefas/${id}`).remove(); }catch(e){} } rCheckinGG(); }

function toggleChkMicGG(gid,tipo){
  const fid='chkgg_'+tipo+'_'+gid;
  const saveFn = tipo==='orient' ? (v=>ggChkSetOrientacao(gid,v)) : (v=>ggChkSetFeedback(gid,v));
  const btn=el('chkggmic_'+tipo+'_'+gid);
  if(CHK_GG_MIC.id===fid && CHK_GG_MIC.rec){ CHK_GG_MIC.rec.onend=null; try{CHK_GG_MIC.rec.stop();}catch(e){} CHK_GG_MIC.rec=null; CHK_GG_MIC.id=null; if(btn){btn.textContent='🎤';btn.style.background='var(--surface)';btn.style.color='var(--accent)';} const ta=el(fid); if(ta) saveFn(ta.value); return; }
  if(CHK_GG_MIC.rec){ try{CHK_GG_MIC.rec.stop();}catch(e){} CHK_GG_MIC.rec=null; }
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition; if(!SR){ showToast('⚠️ Navegador sem ditado por voz'); return; }
  const ta=el(fid); if(!ta) return; CHK_GG_MIC.base=ta.value||''; CHK_GG_MIC.id=fid;
  const r=new SR(); CHK_GG_MIC.rec=r; r.lang='pt-BR'; r.continuous=true; r.interimResults=true;
  r.onstart=()=>{ if(btn){btn.textContent='⏹';btn.style.background='var(--red)';btn.style.color='#fff';} showToast('🎤 Pode falar…'); };
  r.onresult=(e)=>{ let fin='',int=''; for(let i=e.resultIndex;i<e.results.length;i++){ if(e.results[i].isFinal)fin+=e.results[i][0].transcript+' '; else int+=e.results[i][0].transcript; } if(fin)CHK_GG_MIC.base+=(CHK_GG_MIC.base?' ':'')+fin.trim(); const t=el(fid); if(t)t.value=CHK_GG_MIC.base+(int?' '+int:''); };
  r.onerror=()=>{ CHK_GG_MIC.rec=null; CHK_GG_MIC.id=null; if(btn){btn.textContent='🎤';btn.style.background='var(--surface)';btn.style.color='var(--accent)';} };
  r.onend=()=>{ if(CHK_GG_MIC.id===fid && CHK_GG_MIC.rec===r) r.start(); };
  r.start();
}

  let nIn=0,nOut=0;
  MGR.forEach(gid=>{ const r=ggChkGet(gid); if(r.checkin.feito)nIn++; if(r.checkout.feito)nOut++; });

    <div style="font-size:11px;color:var(--text3);margin:2px 0 12px">${fmtDate(td)} · ☀️ Check-in: <b style="color:var(--green)">${nIn}/${MGR.length}</b> · 🌙 Check-out: <b style="color:var(--blue)">${nOut}/${MGR.length}</b></div>`;

    const r=ggChkGet(gid);
    const ci=r.checkin, co=r.checkout;
    const nf=ci.tarefas.filter(t=>t.feito).length;
    const open=CHK_GG_OPEN===gid;
    h+=`<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow)">
      <div onclick="toggleChkGGOpen('${gid}')" style="background:var(--accent);padding:11px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none">
        <div>
          <div style="font-family:'Syne',sans-serif;font-size:15px;font-weight:800;color:#fff">${escSec(NAMES[gid])}</div>
          <div style="font-size:10px;color:rgba(255,255,255,0.7);margin-top:2px">☀️ ${ci.feito?'✓ '+chkHoraGG(ci.hora):'pendente'} · 🌙 ${co.feito?'✓ '+chkHoraGG(co.hora):'pendente'} · ✅ ${nf}/${ci.tarefas.length}</div>
        </div>
        <span style="color:rgba(255,255,255,0.8);font-size:13px">${open?'▲':'▼'}</span>
      </div>`;
    if(open){
      h+=`<div style="padding:12px 14px">`;

      h+=`<div style="font-size:10px;font-weight:800;color:#b8560f;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">☀️ Check-in (plano do dia)</div>`;
      if(ci.foco.length) h+=`<div style="margin-bottom:8px">${ci.foco.map(f=>`<span style="font-size:10px;background:var(--accent);color:#fff;border-radius:10px;padding:2px 8px;margin-right:4px">${escSec(f)}</span>`).join('')}</div>`;
      h+= ci.tarefas.length ? ci.tarefas.map(t=>`
        <div style="display:flex;align-items:center;gap:7px;margin-bottom:6px">

          ${t.por==='gg'?`<span style="font-size:9px;font-weight:700;color:var(--blue);background:var(--blue-bg);border-radius:8px;padding:2px 6px;flex-shrink:0">👔 GG</span>`:''}${t.ia?`<span style="font-size:11px;flex-shrink:0">✨</span>`:''}
          <button onclick="ggChkRemoveTarefa('${gid}','${t.id}')" title="Remover" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:13px;flex-shrink:0">🗑️</button>
        </div>`).join('') : `<div style="font-size:11px;color:var(--text3);font-style:italic;margin-bottom:6px">Sem tarefas ainda.</div>`;
      h+=`<button onclick="ggChkAddTarefa('${gid}')" style="width:100%;padding:7px;border:1.5px dashed var(--border);border-radius:8px;background:var(--surface);color:var(--accent);font-weight:700;font-size:12px;cursor:pointer;margin-bottom:10px">＋ Adicionar tarefa (GG)</button>`;

      const ph=ggProducaoHoje(gid);
      if(ph.length) h+=`<div style="background:var(--green-bg);border:1px solid rgba(30,107,62,0.15);border-radius:8px;padding:8px 11px;margin:6px 0"><div style="font-size:10px;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px">📊 Produção (dia · mês)</div><div style="font-size:12px;color:var(--text2);line-height:1.7">${ph.join('<br>')}</div></div>`;
      if(!co.resultado && !co.travas && !co.aprendizados && !ph.length) h+=`<div style="font-size:11px;color:var(--text3);font-style:italic;margin-bottom:6px">Sem prestação de contas ainda.</div>`;
      h+=`<div style="font-size:10px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.5px;margin:8px 0 4px">🗣️ Seu feedback (check-out)</div>

        <button id="chkggmic_feedback_${gid}" onclick="toggleChkMicGG('${gid}','feedback')" style="margin-top:5px;padding:6px 12px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--accent);font-size:12px;font-weight:700;cursor:pointer">🎤</button>`;
      h+=`<a href="gerente.html?g=${gid}" target="_blank" style="display:inline-block;margin-top:10px;font-size:11px;color:var(--blue);text-decoration:none">🔗 Abrir app do ${escSec(NAMES[gid])}</a>`;
      h+=`</div>`;
    }
    h+=`</div>`;
  });
  h+=`</div>`;
  sec.innerHTML=h;
}

let ggFbReady = false;

function ggFbSync(){
  if(!db || !ggFbReady) return;
  clearTimeout(ggFbSyncTimer);
  ggFbSyncTimer = setTimeout(()=>{
    const now = new Date().toISOString();
    localStorage.setItem('gg_dados_ts', now);
    const payload = {
      agenda:     getGGAgenda(),
      lembretes:  getGGLemb(),
      notas:      getGGNotas(),
      resumos:    getGGResumos(),
      diaCheck:   getGGChecks(),
      _ultima_atualizacao: now
    };
    db.ref(GG_FB_PATH).set(payload).catch(e=>console.warn('GG sync error:', e));
  }, 800);
}

function ggIsLocalVazio(){
  return getGGAgenda().length === 0 && getGGLemb().length === 0 && Object.keys(getGGNotas()).length === 0;
}

function ggAdotarRemotoSeNovo(remote){
  if(!remote) return false;
  const localTs  = localStorage.getItem('gg_dados_ts') || '';
  const remoteTs = remote._ultima_atualizacao || '';
  if(ggIsLocalVazio() || remoteTs > localTs){
    try{ if(remote.agenda)    localStorage.setItem(GG_AGENDA_KEY,   JSON.stringify(remote.agenda)); }catch(e){}
    try{ if(remote.lembretes) localStorage.setItem(GG_LEMB_KEY,     JSON.stringify(remote.lembretes)); }catch(e){}
    try{ if(remote.notas)     localStorage.setItem(GG_NOTAS_KEY,    JSON.stringify(remote.notas)); }catch(e){}
    try{ if(remote.resumos!==undefined)  localStorage.setItem(GG_RESUMOS_KEY, JSON.stringify(remote.resumos||[])); }catch(e){}
    try{ if(remote.diaCheck!==undefined) localStorage.setItem(GG_CHECK_KEY,   JSON.stringify(remote.diaCheck||[])); }catch(e){}
    if(remote._ultima_atualizacao) localStorage.setItem('gg_dados_ts', remote._ultima_atualizacao);
    return true;
  }
  return false;
}

function addNotaDiario(){
  const inp = el('diario_nota_input');
  const texto = inp?.value?.trim();
  if(!texto){ showToast('⚠️ Escreva algo antes de adicionar'); return; }
  if(DIARIO_MIC_ON) toggleDiarioMic();
  const notas = getGGNotas();
  const d = toDateStrGG(today);
  const hm = new Date().toTimeString().slice(0,5);
  notas[d] = (notas[d] ? notas[d]+'\n' : '') + hm + ' — ' + texto;  // múltiplas entradas por dia (uma por linha)
  saveGGNotas(notas);
  if(inp) inp.value='';   // limpa a caixa após adicionar (antes do rDiario, que preserva o que estiver digitado)
  showToast('✅ Nota adicionada!');
  rDiario();
}

function delNotaDiario(d, idx){
  const notas = getGGNotas();
  const linhas = notaLinhas(notas, d);
  linhas.splice(idx,1);
  if(linhas.length) notas[d] = linhas.join('\n'); else delete notas[d];
  saveGGNotas(notas);
  rDiario();
}

function toggleDiarioMic(){
  if(DIARIO_MIC_ON){ if(DIARIO_MIC_REC){ DIARIO_MIC_REC.stop(); DIARIO_MIC_REC=null; } DIARIO_MIC_ON=false; const b=el('diario_mic_btn'); if(b){ b.classList.remove('recording'); b.textContent='🎤'; } return; }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){ showToast('⚠️ Seu navegador não suporta ditado por voz'); return; }
  const inp = el('diario_nota_input'); let base = inp?.value || '';
  DIARIO_MIC_REC = new SR(); DIARIO_MIC_REC.lang='pt-BR'; DIARIO_MIC_REC.continuous=true; DIARIO_MIC_REC.interimResults=true;
  DIARIO_MIC_REC.onstart = ()=>{ DIARIO_MIC_ON=true; const b=el('diario_mic_btn'); if(b){ b.classList.add('recording'); b.textContent='⏹'; } showToast('🎤 Ouvindo…'); };
  DIARIO_MIC_REC.onresult = (e)=>{ let fin='',int=''; for(let i=e.resultIndex;i<e.results.length;i++){ if(e.results[i].isFinal) fin+=e.results[i][0].transcript+' '; else int+=e.results[i][0].transcript; } if(fin) base+=(base?' ':'')+fin.trim(); if(inp) inp.value=base+(int?' '+int:''); };
  DIARIO_MIC_REC.onerror = ()=>toggleDiarioMic();
  DIARIO_MIC_REC.onend = ()=>{ if(DIARIO_MIC_ON) DIARIO_MIC_REC.start(); };
  DIARIO_MIC_REC.start();
}

function copiarResumo(idx){
  const texto = getGGResumos()[idx]?.texto || '';
  if(!texto) return;
  navigator.clipboard.writeText(texto).then(()=>showToast('Copiado! ✓')).catch(()=>{
    const ta=document.createElement('textarea'); ta.value=texto; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); showToast('Copiado! ✓');
  });
}

}

function toDateStrGG(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function fmtDateGG(ds){ const d=new Date(ds+'T00:00:00'); const dias=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb']; const ms=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez']; return `${dias[d.getDay()]}, ${d.getDate()} ${ms[d.getMonth()]}`; }
function formatInlineGG(text){
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em style="color:var(--text2)">$1</em>')
    .replace(/`(.+?)`/g,'<code style="background:rgba(0,0,0,0.06);padding:1px 4px;border-radius:3px;font-family:monospace;font-size:11px">$1</code>');
}
function renderMDgg(text){
  if(!text) return '';
  const lines = text.split('\n');
  let html = '';
  lines.forEach(line => {
    const l = line.trim();
    if(!l){ html += '<br>'; return; }
    const hMatch = l.match(/^#{1,3}\s+(.+)/);
    if(hMatch){ html += `<div style="font-weight:700;color:var(--accent);font-size:12px;text-transform:uppercase;letter-spacing:0.5px;margin:10px 0 4px;padding-bottom:3px;border-bottom:1px solid var(--border)">${hMatch[1].replace(/\*\*/g,'')}</div>`; return; }
    if(/^---+$/.test(l)){ html += '<hr style="border:none;border-top:1px solid rgba(0,0,0,0.1);margin:8px 0">'; return; }
    const liMatch = l.match(/^[-•*]\s+(.+)/);
    if(liMatch){ html += `<div style="display:flex;gap:6px;padding:3px 0"><span style="color:var(--gold);flex-shrink:0">•</span><span>${formatInlineGG(liMatch[1])}</span></div>`; return; }
    const numMatch = l.match(/^(\d+)[.)]\s+(.+)/);
    if(numMatch){ html += `<div style="display:flex;gap:6px;padding:3px 0"><span style="color:var(--gold);font-weight:700;flex-shrink:0;min-width:16px">${numMatch[1]}.</span><span>${formatInlineGG(numMatch[2])}</span></div>`; return; }
    html += `<div style="padding:1px 0">${formatInlineGG(l)}</div>`;
  });
  return html;
}
function fmtGGTime(iso){ const d=new Date(iso); return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; }

function getWeekDates(){
  const d=new Date(today), dow=d.getDay();
  const off=dow===0?-6:1-dow;
  const mon=new Date(d); mon.setDate(d.getDate()+off);
  const dates=[];
  for(let i=0;i<5;i++){ const dt=new Date(mon); dt.setDate(mon.getDate()+i); if(dt<=today) dates.push(toDateStrGG(dt)); }
  return dates;
}

// Contexto completo da agência para a IA
function buildGGContext(){
  const du=getDiasUteisPassados(), dt=getTotalDiasUteis();
  const lines=[];
  lines.push(`GG: Eduardo | Agência Boa Viagem (14400) | Mês: ${MONTH_KEY} | Hoje: ${toDateStrGG(today)} (${du}/${dt} dias úteis)`);
  lines.push('');
  lines.push('=== EQUIPE E STATUS ==');
  MGR.forEach(gid=>{
    const st=gerStatus(gid);
    const tac=getMes(gid,'tac'), tacM=METAS[gid]?.tac||0;
    const pct=tacM>0?(tac/tacM*100).toFixed(0)+'%':'sem meta';
    lines.push(`${NAMES[gid]}: TAC R$ ${fmt(tac)} (${pct}) | Status: ${st.lbl}`);
  });
  lines.push('');
  lines.push('=== CONSOLIDADO DO MÊS ==');
  let tacT=0; MGR.forEach(gid=>tacT+=getMes(gid,'tac'));
  lines.push(`TAC Total: R$ ${fmt(tacT)}`);
  let giroT=0; MGR.forEach(gid=>giroT+=getMes(gid,'giro'));
  lines.push(`Giro Total: ${Math.round(giroT)}`);
  const viabAg=viabGanhoAgencia(); let viabQ=0; MGR.forEach(gid=>viabQ+=viabQtdMesOf(gid));
  lines.push(`Viabilizados: ${viabQ} no mês · Ganho R$ ${viabFmt(viabAg.gMes)} (semestre R$ ${viabFmt(viabAg.gSem)} · ano R$ ${viabFmt(viabAg.gAno)})`);
  let spVop=0; MGR.forEach(gid=>spVop+=getSafrapayVop(gid));
  lines.push(`Safrapay VOP: R$ ${fmt(spVop)}`);
  let crVal=0; MGR.forEach(gid=>crVal+=getCreditoValor(gid));
  lines.push(`Crédito: R$ ${fmt(crVal)}`);
  // Notas do diário desta semana
  const notas=getGGNotas(), week=getWeekDates();
  const notasSemana=week.filter(d=>notas[d]).map(d=>`${fmtDateGG(d)}: ${notas[d]}`);
  if(notasSemana.length){ lines.push(''); lines.push('=== NOTAS DA SEMANA =='); notasSemana.forEach(n=>lines.push(n)); }
  // Agenda (calendário) — próximos 21 dias, com tipo e convidados
  const hojeStr=toDateStrGG(today);
  const limite=toDateStrGG(new Date(today.getFullYear(),today.getMonth(),today.getDate()+21));
  const ag=getEventos().filter(a=>a.data>=hojeStr && a.data<=limite).slice(0,15);
  if(ag.length){ lines.push(''); lines.push('=== AGENDA (próximos 21 dias) =='); ag.forEach(a=>lines.push(`${a.data} ${a.hora||'(dia todo)'} — [${calTipoInfo(a.tipo).lbl}] ${a.titulo}${a.local?' @ '+a.local:''}${a.participantes&&a.participantes.length?' (com: '+a.participantes.map(calNomeUsuario).join(', ')+')':''}`)); }
  const lb=getGGLemb().filter(l=>!l.feito).slice(0,5);
  if(lb.length){ lines.push(''); lines.push('=== LEMBRETES =='); lb.forEach(l=>lines.push(`• ${l.texto}`)); }
  // Resumo de conversas dos gerentes com a SecretárIA
  lines.push('');
  lines.push('=== ÚLTIMAS INTERAÇÕES COM SECRETÁRIA ===');
  MGR.forEach(gid=>{
    const histKey = 'safra_prod_'+gid+'_sec_hist';
    try{
      const hist = JSON.parse(localStorage.getItem(histKey)||'[]');
      const ultimas = hist.slice(-4).filter(m=>m.role==='user').map(m=>m.content?.substring(0,80));
      if(ultimas.length) lines.push(`${NAMES[gid]}: "${ultimas.join('" | "')}"`)
    }catch(e){}
  });
  return lines.join('\n');
}
