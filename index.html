async function enviarGGMsg(){
  if(GG_SEC_LOADING) return;
  const input=el('gg_input');
  const texto=input?.value?.trim();
  const anexo=GG_ANEXO;
  if(!texto && !anexo) return;
  if(GG_MIC_ON) stopGGMic();
  input.value=''; input.style.height='auto';

  const textoMsg = texto || 'Analise este documento e traga os pontos importantes.';
  const displayMsg = anexo ? (textoMsg + `\n\n📎 ${anexo.name}`) : textoMsg;

  const hist=getGGHist();
  hist.push({role:'user',content:displayMsg,ts:new Date().toISOString()});
  saveGGHist(hist);
  renderGGSec();
  GG_SEC_LOADING=true;

  const msgs=el('gg_messages');
  if(msgs){ const ld=document.createElement('div'); ld.className='chat-msg ai'; ld.id='gg_loading'; ld.innerHTML=`<div class="chat-bubble ai loading">${anexo?'📎 Analisando documento…':'⏳ Pensando…'}</div>`; msgs.appendChild(ld); msgs.scrollTop=msgs.scrollHeight; }

  // o anexo já foi capturado em 'anexo'; limpa a UI para o próximo envio
  GG_ANEXO=null; const ff=el('gg_file'); if(ff) ff.value='';

  try{
    const apiMsgs=hist.slice(-20).map(m=>({role:m.role==='user'?'user':'assistant',content:m.content}));
    if(anexo){
      const bloco = anexo.kind==='document'
        ? {type:'document', source:{type:'base64', media_type:'application/pdf', data:anexo.data}}
        : {type:'image',    source:{type:'base64', media_type:anexo.media_type, data:anexo.data}};
      apiMsgs[apiMsgs.length-1] = { role:'user', content:[ bloco, {type:'text', text:textoMsg} ] };
    }
    const data=await callAnthropicAPI(buildGGSystemPrompt(), apiMsgs, anexo?2000:1200);
    const resposta=data.content?.[0]?.text||'Não consegui responder.';
    await processGGActions(resposta);
    const h2=getGGHist();
    h2.push({role:'assistant',content:resposta,ts:new Date().toISOString()});
    saveGGHist(h2);
  }catch(e){
    const h2=getGGHist();
    h2.push({role:'assistant',content:`❌ Erro: ${e.message}`,ts:new Date().toISOString()});
    saveGGHist(h2);
  }

  GG_SEC_LOADING=false;
  renderGGSec();
}

async function processGGActions(texto){
  const m=texto.match(/\`\`\`json\s*([\s\S]*?)\s*\`\`\`/);
  if(!m) return;
  try{
    const a=JSON.parse(m[1]);
    if(a.action==='agendar'){
      const tiposOk=['visita','reuniao','compromisso','lembrete'];
      const tipo=tiposOk.includes(a.tipo)?a.tipo:'compromisso';
      const alertaNum=(a.alerta!==undefined&&a.alerta!==''&&!isNaN(+a.alerta))?[+a.alerta]:(a.hora?[15]:[]);
      const convidar=Array.isArray(a.convidar)?a.convidar.filter(x=>MGR.includes(x)):[];
      const respostas={}; convidar.forEach(p=>respostas[p]='pendente');
      upsertEvento({ tipo, titulo:a.titulo||'(sem título)', data:a.data, hora:a.hora||'', horaFim:a.horaFim||a.hora_fim||'', local:a.local||'', descricao:a.descricao||'', alertas:alertaNum, criadorId:MEU_ID, criadorNome:MEU_NOME, participantes:convidar, respostas, status:'aceito' });
      try{ if(el('sec-calendario')) rCalendarioGG(); }catch(_){}
      try{ rHojeGG(); }catch(_){}
      showToast(`📅 Agendado: ${a.titulo}`+(convidar.length?` (convidado: ${convidar.map(calNomeUsuario).join(', ')})`:''));
    }
    else if(a.action==='lembrete'){ const lb=getGGLemb(); lb.push({texto:a.texto,feito:false,ts:new Date().toISOString()}); saveGGLemb(lb); showToast('⏰ Lembrete salvo!'); }
    else if(a.action==='nota'){ const notas=getGGNotas(); const ds=a.data||toDateStrGG(today); notas[ds]=(notas[ds]?notas[ds]+'\n':'')+a.texto; saveGGNotas(notas); showToast('📋 Nota salva!'); }
    else if(a.action==='recado'){ await enviarRecadoGerentes(a); }
  }catch(e){ console.warn('GG action error:',e); }
}

  </div>`;

function ggRenderAnexoArea(){ const a=el('gg_anexo_area'); if(a) a.innerHTML=ggAnexoChipHTML(); }
function ggRemoverAnexo(){ GG_ANEXO=null; const f=el('gg_file'); if(f) f.value=''; ggRenderAnexoArea(); }
function ggAnexarArquivo(input){
  const file = input.files && input.files[0];
  if(!file) return;
  const isImg = file.type.startsWith('image/');
  const isPdf = file.type==='application/pdf';
  if(!isImg && !isPdf){ showToast('⚠️ Anexe uma imagem ou um PDF'); input.value=''; return; }
  if(file.size > 5*1024*1024){ showToast('⚠️ Arquivo muito grande (máx 5MB). Para PDF grande, fotografe só a página relevante.'); input.value=''; return; }
  const area = el('gg_anexo_area');
  if(area) area.innerHTML = `<div style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:8px 10px;margin:0 0 8px;font-size:12px">
    <div style="margin-bottom:6px">⏳ Carregando ${escDiario(file.name)}…</div>
    <div style="height:6px;background:var(--border);border-radius:4px;overflow:hidden"><div id="gg_anexo_prog" style="height:100%;width:0%;background:var(--accent);transition:width .1s"></div></div>
  </div>`;
  const reader = new FileReader();
  reader.onprogress = (e)=>{ if(e.lengthComputable){ const bar=el('gg_anexo_prog'); if(bar) bar.style.width=Math.round(e.loaded/e.total*100)+'%'; } };
  reader.onload = ()=>{
    const bar=el('gg_anexo_prog'); if(bar) bar.style.width='100%';
    const base64 = String(reader.result||'').split(',')[1] || '';
    GG_ANEXO = { name:file.name, media_type:isPdf?'application/pdf':file.type, kind:isPdf?'document':'image', data:base64 };
    ggRenderAnexoArea();
    showToast('📎 Anexo pronto — escreva sua pergunta (ou só envie) que eu analiso');
  };
  reader.onerror = ()=>{ showToast('❌ Erro ao ler o arquivo'); ggRemoverAnexo(); };
  reader.readAsDataURL(file);
}

async function enviarRecadoGerentes(a){
  // Resolver destinatário
  const textoRecado = a.texto || '';
  const para = a.para || 'todos'; // 'todos' ou gerente_id ex: 'bruno'
  const todayStr = toDateStrGG(today);
  const ts = new Date().toISOString();

  const recado = { texto: textoRecado, para, data: todayStr, ts, de: 'gg' };

  // Salvar no Firebase
  try {
    const db = firebase.database();
    const ref = db.ref(`agencia/boa_viagem/${MONTH_KEY}/recados`);
    await ref.push(recado);
    const dest = para === 'todos' ? 'todos os gerentes' : (NAMES[para] || para);
    showToast(`📢 Recado enviado para ${dest}!`);
  } catch(e) {
    showToast('❌ Erro ao enviar recado: ' + e.message);
  }
}

function startGGMic(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){ showToast('⚠️ Use Chrome para reconhecimento de voz'); return; }
  GG_MIC_REC=new SR(); GG_MIC_REC.lang='pt-BR'; GG_MIC_REC.continuous=true; GG_MIC_REC.interimResults=true;
  const btn=el('gg_mic_btn'), input=el('gg_input');
  let base=input?.value||'';
  GG_MIC_REC.onstart=()=>{ GG_MIC_ON=true; if(btn){btn.classList.add('rec');btn.textContent='⏹';} showToast('🎤 Ouvindo…'); };
  GG_MIC_REC.onresult=(e)=>{ let fin='',int=''; for(let i=e.resultIndex;i<e.results.length;i++){ if(e.results[i].isFinal)fin+=e.results[i][0].transcript+' '; else int+=e.results[i][0].transcript; } if(fin)base+=(base?' ':'')+fin.trim(); if(input)input.value=base+(int?' '+int:''); };
  GG_MIC_REC.onerror=()=>stopGGMic();
  GG_MIC_REC.onend=()=>{ if(GG_MIC_ON)GG_MIC_REC.start(); };
  GG_MIC_REC.start();
}
function stopGGMic(){ GG_MIC_ON=false; if(GG_MIC_REC){GG_MIC_REC.stop();GG_MIC_REC=null;} const btn=el('gg_mic_btn'); if(btn){btn.classList.remove('rec');btn.textContent='🎤';} showToast('⏹ Gravação encerrada'); }

function carregarRecadosGG(){
  if(typeof firebase === 'undefined') return;
  const todayStr = toDateStrGG(today);
  const db2 = firebase.database();
  db2.ref(`agencia/boa_viagem/${MONTH_KEY}/recados`).once('value', snap=>{
    const val = snap.val();
    const lista = el('gg_recados_lista');
    const count = el('gg_recados_count');
    if(!lista) return;
    if(!val){
      lista.innerHTML = '<span style="color:var(--text3);font-style:italic">Nenhum recado enviado hoje.</span>';
      if(count) count.textContent = '0 recados';
      return;
    }
    const all = Object.entries(val).map(([k,r])=>({...r,_key:k})).filter(r=>r.data===todayStr);
    const enviados  = all.filter(r=>(r.de==='gg'||!r.de)).sort((a,b)=>a.ts?.localeCompare(b.ts||'')||0);
    const recebidos = all.filter(r=>r.para==='gg' && r.de && r.de!=='gg').sort((a,b)=>a.ts?.localeCompare(b.ts||'')||0);
    if(count) count.textContent = `${enviados.length} enviado(s)${recebidos.length?' · '+recebidos.length+' recebido(s)':''}`;
    if(!enviados.length && !recebidos.length){
      lista.innerHTML = '<span style="color:var(--text3);font-style:italic">Nenhum recado hoje.</span>';
      return;
    }
    let outHtml = enviados.map(r=>{
      const dt = new Date(r.ts);
      const hr = `${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`;
      const dest = r.para==='todos' ? 'Todos' : (NAMES[r.para]||r.para);
      const lidoPor = r.lido_por ? Object.keys(r.lido_por) : [];
      const totalDest = r.para==='todos' ? MGR.length : 1;
      const lidoTxt = lidoPor.length === 0
        ? '<span style="color:var(--text3)">⏳ Não lido</span>'
        : lidoPor.length >= totalDest
          ? `<span style="color:var(--green);font-weight:700">✓✓ Lido por todos</span>`
          : `<span style="color:var(--orange)">✓ Lido por ${lidoPor.map(g=>NAMES[g]||g).join(', ')}</span>`;
      return `<div style="padding:8px 10px;background:var(--surface2);border-radius:8px;margin-bottom:6px">
        <div style="display:flex;justify-content:space-between;margin-bottom:4px">
          <span style="font-size:10px;font-weight:700;color:var(--accent)">→ ${dest}</span>
          <span style="font-size:9px;color:var(--text3)">${hr}</span>
        </div>
        <div style="font-size:12px;color:var(--text);line-height:1.4;margin-bottom:4px">${r.texto?.replace(/</g,'&lt;')||''}</div>
        <div style="font-size:10px">${lidoTxt}</div>
      </div>`;
    }).join('');
    if(recebidos.length){
      outHtml += `<div style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin:10px 0 4px">📥 Recebidos dos gerentes</div>`;
      outHtml += recebidos.map(r=>{
        const dt=new Date(r.ts); const hr=`${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`;
        const rem=NAMES[r.de]||r.de;
        return `<div style="padding:8px 10px;background:var(--blue-bg);border-radius:8px;margin-bottom:6px"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:10px;font-weight:700;color:var(--blue)">← ${rem}</span><span style="font-size:9px;color:var(--text3)">${hr}</span></div><div style="font-size:12px;color:var(--text);line-height:1.4">${r.texto?.replace(/</g,'&lt;')||''}</div></div>`;
      }).join('');
    }
    lista.innerHTML = outHtml;
  });
}

// Botão flutuante "Dia Check" do GG — disciplina pessoal (local neste aparelho)
const GG_CHECK_KEY = 'gg_dia_check_v1';
function getGGChecks(){ try{ return JSON.parse(localStorage.getItem(GG_CHECK_KEY)||'[]'); }catch(e){ return []; } }
function ggStreak(){
  const set=new Set(getGGChecks()); let n=0; const d=new Date(today);
  // se hoje (útil) ainda não foi marcado, começa do dia útil anterior (não quebra a sequência)
  if(isBusinessDay(d) && !set.has(toDateStrGG(d))) d.setDate(d.getDate()-1);
  for(let i=0;i<200;i++){
    if(!isBusinessDay(d)){ d.setDate(d.getDate()-1); continue; } // pula fim de semana e feriado
    if(set.has(toDateStrGG(d))){ n++; d.setDate(d.getDate()-1); }
    else break;
  }
  return n;
}
function toggleGGDiaCheck(){
  const hoje=toDateStrGG(today); let arr=getGGChecks();
  if(arr.includes(hoje)){ arr=arr.filter(x=>x!==hoje); showToast('⏳ Dia desmarcado'); }
  else { arr.push(hoje); showToast('✅ Dia conferido! 🔥'); }
  arr=arr.filter(d=>{ const diff=(new Date(toDateStrGG(today)+'T00:00:00')-new Date(d+'T00:00:00'))/86400000; return diff>=0 && diff<=90; }).sort();
  try{ localStorage.setItem(GG_CHECK_KEY, JSON.stringify(arr)); }catch(e){}
  try{ ggFbSync(); }catch(e){}
  renderDiaCheckFabGG();
}
function renderDiaCheckFabGG(){
  const b=document.getElementById('diaCheckBtnGG');
  if(!b) return;
  const done=getGGChecks().includes(toDateStrGG(today));
  const st=ggStreak();
  b.title=done?'Dia conferido — toque para desmarcar':'Confirme que você cumpriu seu dia (disciplina pessoal)';
  b.style.background=done?'var(--green)':'var(--orange)';
  b.textContent=done?`✅ Dia conferido${st>1?' · 🔥'+st:''}`:'☑️ Dia Check';
}

// Presença em tempo real dos gerentes (heartbeat — online = sinal nos últimos ~90s)
let PRESENCE = {};
function gerOnline(gid){ const p=PRESENCE[gid]; return !!(p && p.ts && (Date.now()-p.ts) < 90000); }
function atualizarPresenceUI(){
  let n=0;
  MGR.forEach(gid=>{
    const on=gerOnline(gid); if(on) n++;
    const dot=el('pres_'+gid); if(dot) dot.style.background = on?'var(--green)':'var(--text3)';
    const ts=el('prests_'+gid);
    if(ts){
      if(on){ ts.textContent='🟢 online'; ts.style.color='var(--green)'; }
      else { const p=PRESENCE[gid]; if(p&&p.ts){ const d=new Date(p.ts); const hoje=d.toDateString()===new Date().toDateString(); ts.textContent = hoje?`visto ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`:`${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}`; } else { ts.textContent='offline'; } ts.style.color='var(--text3)'; }
    }
  });
  const c=el('hoje_pres_count'); if(c) c.textContent=n;
}

async function gerarAnaliseGG(){
  if(GG_ANALISE_LOADING) return;
  const key = checkApiKey(); if(!key) return;
  GG_ANALISE_LOADING = true;
  const btn = el('gg_analise_btn');
  const res = el('gg_analise_resultado');
  if(btn){ btn.disabled=true; btn.textContent='⏳ Analisando…'; }
  if(res){ res.innerHTML='<div style="padding:12px;color:var(--text3);font-style:italic;font-size:12px">Gerando análise…</div>'; }

  const du = getDiasUteisPassados(), dt = getTotalDiasUteis(), rest = dt - du;
  let ctx = `Agência Boa Viagem (Banco Safra) — ${MONTH_KEY}\nDias úteis: ${du} de ${dt} (${rest} restantes)\n\nPerformance dos Gerentes:\n`;
  MGR.forEach(gid=>{
    const st = gerStatus(gid);
    ctx += `\n${NAMES[gid]} (${st.lbl}):\n`;
    PRODUTOS_CFG.filter(p=>!p.customCard).forEach(p=>{
      const real = p.valFn(gid), meta = getMeta(gid, p.id);
      if(meta>0 || real>0){
        const pct = meta>0 ? (real/meta*100).toFixed(1) : '—';
        const gap = meta>0 ? Math.max(meta-real,0) : null;
        ctx += `  ${p.lbl}: ${p.fmt_(real)}${meta>0?` / meta ${p.fmt_(meta)} (${pct}%)${gap>0?` GAP ${p.fmt_(gap)}`:''}`:''}\n`;
      }
    });
  });

  const system = `Você é um assistente de gestão comercial do Gerente Geral da Agência Boa Viagem (Banco Safra), Eduardo.

GLOSSÁRIO DOS PRODUTOS (para contexto nas análises):
- TAC: Tarifa de Contratação de Crédito — tarifa cobrada ao cliente na contratação de operações de crédito (capital de giro, desconto de recebíveis, etc.). Não é um produto comercializável; é uma receita gerada sobre operações de crédito.
- Giro de Carteira: quantidade de clientes ativos contatados/movimentados no mês.
- Collar Kin: Operação Estruturada da Safra Corretora (renda variável / opções sobre ações). Oferece proteção contra queda da ação e participação na valorização até uma barreira de alta definida no início. Indicado para investidores com perfil agressivo.
- Viabilizados: clientes levados à produção ou pipeline em produtos como SafraPay, crédito, captação, margem.
- Safrapay VOP: volume de operações produzidas no SafraPay (maquininha/pix).
- Crédito BS: operações de crédito Banco Safra (financiamentos, antecipações, capital de giro).

Com base nos dados de performance abaixo, gere uma análise executiva com três seções:
1. **Visão Geral** — resumo objetivo do momento da agência
2. **Pontos de Atenção** — máx. 3 gerentes/produtos que precisam de ação urgente, com contexto
3. **Plano de Ação para Hoje** — 3 a 5 ações concretas e priorizadas

Seja direto, prático e sem positividade tóxica. Use markdown básico. Máx. 450 palavras.`;

  try {
    const resp = await callAnthropicAPI(system, [{role:'user', content: ctx}], 1600);
    const txt = resp.content?.[0]?.text || 'Sem resposta.';
    if(res){ res.innerHTML = `<div style="padding:12px 0;font-size:13px;line-height:1.65;color:var(--text)">${renderMDgg(txt)}</div>`; }
  } catch(e){
    if(res){ res.innerHTML = `<div style="padding:12px;color:var(--red);font-size:12px">❌ ${e.message}</div>`; }
  } finally {
    GG_ANALISE_LOADING = false;
    if(btn){ btn.disabled=false; btn.textContent='🔄 Atualizar análise'; }
  }
}

function abrirAuditoria(){
  // Coletar logs de todos os gerentes via Firebase DATA
  let todosLogs = [];
  MGR.forEach(gid=>{
    const raw = DATA[gid]?._audit_log;
    if(raw){
      try{
        const logs = JSON.parse(raw);
        logs.forEach(l=>{ l._gid = gid; l._nome = NAMES[gid]; todosLogs.push(l); });
      }catch(e){}
    }
  });

  // Ordenar por timestamp mais recente
  todosLogs.sort((a,b)=>new Date(b.ts)-new Date(a.ts));

  const modal = el('modalAuditoria');
  const body  = el('auditBody');

  if(!todosLogs.length){
    body.innerHTML = `<div style="text-align:center;padding:20px;color:var(--text3);font-size:12px">Nenhum registro de auditoria ainda.</div>`;
  } else {
    const tipoLabel = { fechamento_auto:'📅 Fechamento auto', ajuste_substituicao:'✏️ Substituição', ajuste_adicao:'➕ Adição' };
    body.innerHTML = todosLogs.slice(0,100).map(l=>{
      const dt = new Date(l.ts);
      const dtStr = `${String(dt.getDate()).padStart(2,'0')}/${String(dt.getMonth()+1).padStart(2,'0')} ${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`;
      const cor = l.tipo==='fechamento_auto'?'var(--text3)':l.tipo==='ajuste_substituicao'?'var(--orange)':'var(--blue)';
      return `<div style="padding:8px 14px;border-bottom:1px solid var(--border);font-size:11px">
        <div style="display:flex;justify-content:space-between;margin-bottom:2px">
          <strong style="color:var(--accent)">${l._nome}</strong>
          <span style="color:var(--text3);font-family:'IBM Plex Mono',monospace">${dtStr}</span>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <span style="color:${cor};font-weight:600">${tipoLabel[l.tipo]||l.tipo}</span>
          <span style="color:var(--text2)">${l.modulo} · ${l.data_alvo||'hoje'}</span>
        </div>
        <div style="color:var(--text3);margin-top:2px">
          ${l.valor_anterior?`Antes: ${l.valor_anterior} →`:''}
          <strong style="color:var(--text)">${l.valor_novo}</strong>
        </div>
      </div>`;
    }).join('');
  }

  modal.classList.add('open');
}

function getCalMap(){ try{ return JSON.parse(localStorage.getItem(CAL_KEY)||'{}'); }catch(e){ return {}; } }
function saveCalMap(m){ try{ localStorage.setItem(CAL_KEY, JSON.stringify(m)); }catch(e){} }
function getEventos(){ return Object.values(getCalMap()).filter(e=>e&&e.data).sort((a,b)=>(a.data+(a.hora||'')).localeCompare(b.data+(b.hora||''))); }
function getEventosOwner(){ const src = CAL_VIEW_OWNER==='gg' ? getCalMap() : (CAL_TEAM[CAL_VIEW_OWNER]||{}); return Object.values(src).filter(e=>e&&e.data).sort((a,b)=>(a.data+(a.hora||'')).localeCompare(b.data+(b.hora||''))); }

function genEventId(){ return 'evt_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,7); }

function calReplicarConvidados(evt){
  if(!db || !evt || evt.criadorId!==MEU_ID || !Array.isArray(evt.participantes)) return;
  evt.participantes.forEach(pid=>{ if(pid && pid!==MEU_ID){ try{ db.ref(`agencia/boa_viagem/calendar/${pid}/events/${evt.id}`).set(evt); }catch(_){} } });
}
function calRemoverDeConvidados(id, ids){
  if(!db || !Array.isArray(ids)) return;
  ids.forEach(pid=>{ if(pid && pid!==MEU_ID){ try{ db.ref(`agencia/boa_viagem/calendar/${pid}/events/${id}`).remove(); }catch(_){} } });
}
function calResponder(id, resposta, silent){
  const m=getCalMap(); const e=m[id]; if(!e) return;
  e.respostas = e.respostas||{};
  if(resposta==='lido' && ['aceito','recusado'].includes(e.respostas[MEU_ID])) return;
  if(e.respostas[MEU_ID]===resposta) return;
  e.respostas[MEU_ID]=resposta; e.updatedAt=new Date().toISOString();
  m[id]=e; saveCalMap(m);
  if(db){
    try{ db.ref(`${CAL_PATH}/events/${id}/respostas/${MEU_ID}`).set(resposta); }catch(_){}
    if(e.criadorId && e.criadorId!==MEU_ID){ try{ db.ref(`agencia/boa_viagem/calendar/${e.criadorId}/events/${id}/respostas/${MEU_ID}`).set(resposta); }catch(_){} }
  }
  if(!silent){ if(el('sec-calendario')) rCalendarioGG(); try{ rHojeGG(); }catch(_){} if(resposta==='aceito') showToast('✅ Você aceitou'); else if(resposta==='recusado') showToast('❌ Você recusou'); }
}
function calMarcarLidos(){
  getEventos().forEach(e=>{ if(e.criadorId && e.criadorId!==MEU_ID){ const r=(e.respostas||{})[MEU_ID]; if(!r || r==='pendente') calResponder(e.id,'lido',true); } });
}
function upsertEvento(evt){
  const m=getCalMap();
  if(!evt.id) evt.id=genEventId();
  evt.updatedAt=new Date().toISOString();
  if(!evt.ts) evt.ts=evt.updatedAt;
  m[evt.id]=evt; saveCalMap(m);
  if(db){ try{ db.ref(`${CAL_PATH}/events/${evt.id}`).set(evt); }catch(e){} }
  calReplicarConvidados(evt);
  return evt;
}
function deleteEvento(id){
  const m=getCalMap(); const evt=m[id]; delete m[id]; saveCalMap(m);
  if(db){ try{ db.ref(`${CAL_PATH}/events/${id}`).remove(); }catch(e){} }
  if(evt && (!evt.criadorId || evt.criadorId===MEU_ID)) calRemoverDeConvidados(id, evt.participantes||[]);
}

function initCalSyncGG(){
  if(!db) return;
  let first=true;
  db.ref(`${CAL_PATH}/events`).on('value', snap=>{
    const val=snap.val()||{}; const local=getCalMap();
    if(first){
      Object.values(local).forEach(e=>{ if(e && !val[e.id]){ try{ db.ref(`${CAL_PATH}/events/${e.id}`).set(e); }catch(_){} } });
      saveCalMap({ ...val, ...local }); first=false;
    } else {
      Object.values(val).forEach(e=>{ if(e && e.criadorId && e.criadorId!==MEU_ID && !local[e.id]){ calNotificar('📅 Convite de '+calNomeUsuario(e.criadorId), (e.data||'')+(e.hora?(' '+e.hora):'')+' — '+(e.titulo||'')); } });
      saveCalMap(val);
    }
    if(el('sec-calendario') && !CAL_FORM_OPEN) rCalendarioGG();
    try{ rHojeGG(); }catch(_){}
    try{ calMarcarLidos(); }catch(_){}
  }, err=>console.warn('cal gg listener',err));
  // Agendas dos gerentes (visão de equipe — leitura)
  MGR.forEach(gid=>{
    db.ref(`agencia/boa_viagem/calendar/${gid}/events`).on('value', snap=>{
      CAL_TEAM[gid]=snap.val()||{};
      if(CAL_VIEW_OWNER===gid && el('sec-calendario') && !CAL_FORM_OPEN) rCalendarioGG();
    }, ()=>{});
  });
}

// ── Exportar .ics ──
function calIcsDT(data, hora){ const ymd=data.replace(/-/g,''); if(!hora) return {allDay:true,v:ymd}; return {allDay:false,v:ymd+'T'+hora.replace(':','')+'00'}; }
function calBaixarICS(id){
  const e=getCalMap()[id] || (CAL_TEAM[CAL_VIEW_OWNER]||{})[id]; if(!e) return;
  const dtStart=calIcsDT(e.data,e.hora); let dtEnd=null;
  if(e.hora){ let fim=e.horaFim; if(!fim){ const [hh,mm]=e.hora.split(':').map(Number); const d2=new Date(2000,0,1,hh,mm+60); fim=String(d2.getHours()).padStart(2,'0')+':'+String(d2.getMinutes()).padStart(2,'0'); } dtEnd=calIcsDT(e.data,fim); }
  const n=new Date(), p=x=>String(x).padStart(2,'0');
  const dtstamp=n.getUTCFullYear()+p(n.getUTCMonth()+1)+p(n.getUTCDate())+'T'+p(n.getUTCHours())+p(n.getUTCMinutes())+p(n.getUTCSeconds())+'Z';
  const esc=s=>String(s||'').replace(/\\/g,'\\\\').replace(/;/g,'\\;').replace(/,/g,'\\,').replace(/\n/g,'\\n');
  const L=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Aplicativo BV//Calendario//PT','CALSCALE:GREGORIAN','BEGIN:VEVENT','UID:'+e.id+'@aplicativobv','DTSTAMP:'+dtstamp];
  if(dtStart.allDay) L.push('DTSTART;VALUE=DATE:'+dtStart.v); else { L.push('DTSTART:'+dtStart.v); if(dtEnd) L.push('DTEND:'+dtEnd.v); }
  L.push('SUMMARY:'+esc(calTipoInfo(e.tipo).icon+' '+e.titulo));
  if(e.local) L.push('LOCATION:'+esc(e.local));
  if(e.descricao) L.push('DESCRIPTION:'+esc(e.descricao));
  (e.alertas||[]).forEach(min=>{ L.push('BEGIN:VALARM','ACTION:DISPLAY','DESCRIPTION:'+esc(e.titulo),'TRIGGER:-PT'+Math.max(0,+min)+'M','END:VALARM'); });
  L.push('END:VEVENT','END:VCALENDAR');
  const blob=new Blob([L.join('\r\n')],{type:'text/calendar;charset=utf-8'});
  const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download=(e.titulo||'evento').replace(/[^\w\-]+/g,'_')+'.ics';
  document.body.appendChild(a); a.click(); document.body.removeChild(a); setTimeout(()=>URL.revokeObjectURL(url),1500);
  showToast('📲 Arquivo .ics baixado — ABRA o arquivo p/ adicionar ao calendário do Mac/PC/celular');
}

// ── Alarme sonoro persistente ──
let CAL_ALARM={active:false,queue:[],beepTimer:null,ctx:null,current:null};
function calGetCtx(){ try{ if(!CAL_ALARM.ctx){ const AC=window.AudioContext||window.webkitAudioContext; if(!AC) return null; CAL_ALARM.ctx=new AC(); } if(CAL_ALARM.ctx.state==='suspended') CAL_ALARM.ctx.resume(); return CAL_ALARM.ctx; }catch(e){ return null; } }
function calBeep(){ const ctx=calGetCtx(); if(!ctx) return; try{ const t=ctx.currentTime; [[880,0],[660,0.6]].forEach(([freq,off])=>{ const o=ctx.createOscillator(),g=ctx.createGain(); o.type='sine'; o.frequency.value=freq; o.connect(g); g.connect(ctx.destination); g.gain.setValueAtTime(0.0001,t+off); g.gain.exponentialRampToValueAtTime(0.5,t+off+0.02); g.gain.exponentialRampToValueAtTime(0.0001,t+off+0.5); o.start(t+off); o.stop(t+off+0.55); }); }catch(e){} }
function calNotificar(titulo, corpo){ try{ if('Notification' in window && Notification.permission==='granted'){ new Notification(titulo,{body:corpo||''}); } }catch(e){} showToast(titulo+(corpo?(' — '+corpo):'')); }
function dispararAlarme(e, min){ CAL_ALARM.queue.push({e,min}); if(!CAL_ALARM.active) mostrarProximoAlarme(); }
function mostrarProximoAlarme(){
  const item=CAL_ALARM.queue.shift(); if(!item){ CAL_ALARM.active=false; CAL_ALARM.current=null; return; }
  CAL_ALARM.active=true; CAL_ALARM.current=item; const {e}=item; const ti=calTipoInfo(e.tipo);
  const horaTxt=e.hora?('⏰ '+e.hora+(e.horaFim?('–'+e.horaFim):'')):'Dia todo';
  try{ if('Notification' in window && Notification.permission==='granted'){ const nn=new Notification('🔔 '+e.titulo,{body:horaTxt+(e.local?(' · 📍 '+e.local):''),requireInteraction:true,tag:'cal-'+e.id}); nn.onclick=()=>{ try{window.focus();}catch(_){}}; } }catch(_){}
  try{ if(navigator.vibrate) navigator.vibrate([400,200,400,200,400]); }catch(_){}
  let ov=document.getElementById('cal_alarm_overlay'); if(!ov){ ov=document.createElement('div'); ov.id='cal_alarm_overlay'; document.body.appendChild(ov); }
  ov.setAttribute('style','position:fixed;inset:0;z-index:99999;background:rgba(0,0,0,0.55);display:flex;align-items:center;justify-content:center;padding:24px');
  ov.innerHTML=`<div style="background:var(--surface,#fff);border-radius:16px;max-width:340px;width:100%;padding:22px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.45);border-top:6px solid ${ti.cor}">
    <div style="font-size:42px;margin-bottom:4px">${ti.icon}</div>
    <div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px">Alerta de ${ti.lbl}</div>
    <div style="font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--text,#111);margin:6px 0">${escSec(e.titulo)}</div>
    <div style="font-size:13px;color:${ti.cor};font-weight:700">${horaTxt}</div>
    ${e.local?`<div style="font-size:12px;color:var(--text3);margin-top:2px">📍 ${escSec(e.local)}</div>`:''}
    ${e.descricao?`<div style="font-size:12px;color:var(--text3);margin-top:6px">${escSec(e.descricao)}</div>`:''}
    <button onclick="pararAlarme()" style="margin-top:16px;width:100%;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:800;cursor:pointer">🔕 Parar alerta</button>
    <button onclick="adiarAlarme(5)" style="margin-top:8px;width:100%;padding:10px;background:var(--surface2,#eee);color:var(--text,#333);border:1px solid var(--border);border-radius:10px;font-size:13px;font-weight:700;cursor:pointer">😴 Soneca 5 min</button>
  </div>`;
  calBeep(); clearInterval(CAL_ALARM.beepTimer);
  CAL_ALARM.beepTimer=setInterval(()=>{ calBeep(); try{ if(navigator.vibrate) navigator.vibrate(300); }catch(_){} }, 3000);
}
function pararAlarme(){ clearInterval(CAL_ALARM.beepTimer); CAL_ALARM.beepTimer=null; const ov=document.getElementById('cal_alarm_overlay'); if(ov) ov.remove(); CAL_ALARM.active=false; CAL_ALARM.current=null; if(CAL_ALARM.queue.length) setTimeout(mostrarProximoAlarme,400); }
function adiarAlarme(minutos){ const cur=CAL_ALARM.current; pararAlarme(); if(cur){ showToast('😴 Soneca de '+minutos+' min'); setTimeout(()=>{ const fresh=getCalMap()[cur.e.id]; if(fresh) dispararAlarme(fresh,cur.min); }, minutos*60000); } }
function calPedirPermissao(){
  calGetCtx();
  if(!('Notification' in window)){ showToast('⚠️ Este navegador não suporta notificações'); return; }
  Notification.requestPermission().then(perm=>{ if(el('sec-calendario')) rCalendarioGG(); if(perm==='granted'){ try{ new Notification('🔔 Alertas ativados!',{body:'Você será avisado na hora dos seus compromissos.'}); }catch(_){}; calBeep(); showToast('🔔 Alertas ativados! (toquei um som de teste)'); } else showToast('🔕 Ative depois nas permissões do navegador'); });
}

function checkCalAlerts(){
  const now=new Date(), alerted=getCalAlerted();
  getEventos().forEach(e=>{ if(!e.hora||!e.alertas||!e.alertas.length) return; const evDt=new Date(e.data+'T'+e.hora+':00'); if(isNaN(evDt)) return;
    e.alertas.forEach(min=>{ const key=e.id+'|'+min; if(alerted.includes(key)) return; const alertDt=new Date(evDt.getTime()-(+min)*60000);
      if(now>=alertDt && now<=new Date(evDt.getTime()+30*60000)){ dispararAlarme(e,min); addCalAlerted(key); } }); });
}
let CAL_ALERT_TIMER=null;
function startCalAlerts(){ if(CAL_ALERT_TIMER) return; checkCalAlerts(); CAL_ALERT_TIMER=setInterval(checkCalAlerts,30000); }

// scroll hint
(function(){
  const tabsEl=el('tabs'),wrapper=el('tabsWrapper');
  function upd(){
    const s=tabsEl.scrollLeft,e=tabsEl.scrollWidth-tabsEl.clientWidth;
    wrapper.classList.toggle('scroll-start',s<=4);
    wrapper.classList.toggle('scroll-end',s>=e-4);
    wrapper.classList.toggle('scroll-mid',s>4);
  }
